<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Brain • Warriors</title>
<meta name="apple-mobile-web-app-title" content="Brain" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<style>
  :root{
    --bg:#0e1116; --panel:#171b22; --panel2:#1e232c; --line:#2a2f3a;
    --txt:#e8ebf0; --mut:#9aa3b2; --dim:#6b7382;
    --accent:#22d3a6; --accent-dim:#0f6e56;
    --good:#22d3a6; --bad:#e0603a; --warn:#eaa640; --info:#4f8fe0; --purple:#8b82f0;
    --radius:12px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:16px 16px 64px}
  header{display:flex;align-items:center;gap:12px;padding:6px 2px 18px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#06231b;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px}
  .brand{font-weight:600;font-size:19px;letter-spacing:-.2px}
  .brand small{display:block;font-weight:400;font-size:12px;color:var(--mut);letter-spacing:0}
  .sync-dot{margin-left:auto;font-size:12px;color:var(--mut);display:flex;align-items:center;gap:6px}
  .sync-dot i{width:8px;height:8px;border-radius:50%;background:var(--dim);display:inline-block}

  .layout{display:grid;grid-template-columns:270px 1fr;gap:16px}
  @media(max-width:760px){.layout{grid-template-columns:1fr}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}
  .matches{padding:8px;max-height:78vh;overflow:auto}
  @media(max-width:760px){.matches{max-height:none}}
  .mtitle{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);padding:8px 10px 4px}
  .match{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent}
  .match:hover{background:var(--panel2)}
  .match.on{background:var(--panel2);border-color:var(--accent-dim)}
  .match .op{font-weight:600;font-size:14.5px}
  .match .dt{font-size:12px;color:var(--mut)}
  .match .sc{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:600;font-size:14px}
  .pill{font-size:11px;padding:1px 7px;border-radius:8px;font-weight:600}
  .pill.win{background:rgba(34,211,166,.14);color:var(--good)}
  .pill.loss{background:rgba(224,96,58,.16);color:var(--bad)}

  .content{min-height:60vh}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:56px 24px;color:var(--mut);gap:10px}
  .empty h2{color:var(--txt);font-weight:600;margin:6px 0 0}
  .empty code{background:var(--panel2);padding:2px 7px;border-radius:6px;font-size:13px;color:var(--accent)}

  .head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin:2px 2px 14px}
  .head h1{font-size:21px;font-weight:600;margin:0;letter-spacing:-.3px}
  .head .dt{font-size:13px;color:var(--mut)}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .stat .k{font-size:12px;color:var(--mut)}
  .stat .v{font-size:23px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
  .stat .v.good{color:var(--good)} .stat .v.bad{color:var(--bad)} .stat .v.warn{color:var(--warn)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
  @media(max-width:760px){.grid2{grid-template-columns:1fr}}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px}
  .box h3{font-size:14px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .box h3 .sub{font-weight:400;color:var(--dim);font-size:12px}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:right;padding:6px 8px;font-variant-numeric:tabular-nums}
  th:first-child,td:first-child{text-align:left}
  thead th{color:var(--dim);font-weight:500;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line)}
  tbody tr{border-bottom:1px solid rgba(42,47,58,.5)}
  tbody tr:hover{background:var(--panel2)}
  .num{color:var(--dim);width:26px}

  .court-wrap{display:flex;flex-direction:column;align-items:center}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--mut);margin-top:8px}
  .legend b{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:-1px}

  .insight{background:linear-gradient(180deg,rgba(34,211,166,.07),rgba(34,211,166,.02));
    border:1px solid var(--accent-dim);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px}
  .insight h3{margin:0 0 8px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--accent)}
  .insight ul{margin:0;padding-left:18px}
  .insight li{margin:5px 0;font-size:14px}
  .insight .tag{font-size:11px;color:var(--dim);font-weight:400;margin-left:auto}

  .ask{display:flex;gap:8px;margin-top:6px}
  .ask input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:11px 13px;color:var(--txt);font-size:14px}
  .ask input:focus{outline:none;border-color:var(--accent-dim)}
  .ask button{background:var(--accent);color:#06231b;border:none;border-radius:10px;
    padding:0 16px;font-weight:600;font-size:14px;cursor:pointer}
  .note{font-size:12px;color:var(--dim);margin-top:8px;line-height:1.5}
  .cschip{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:12px 13px;font-size:13.5px;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;font-family:inherit}
  .cschip:hover{border-color:var(--accent);background:#20323a}
  .cschip:active{transform:scale(.99)}
  .phase{display:inline-block;font-size:11px;color:var(--warn);border:1px solid rgba(234,166,64,.3);
    background:rgba(234,166,64,.08);border-radius:7px;padding:1px 7px;margin-left:6px}
  .loading{padding:40px;text-align:center;color:var(--mut)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">B</div>
    <div class="brand">Brain<small>Warriors film + analytics</small></div>
    <div class="sync-dot" id="syncDot"><i></i><span>connecting…</span></div>
  </header>

  <div class="layout">
    <aside class="card matches" id="matchList">
      <div class="mtitle">Games</div>
      <div class="loading">Loading…</div>
    </aside>
    <main class="content" id="content">
      <div class="empty"><div class="loading">Loading…</div></div>
    </main>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

const SUPABASE_URL = 'https://vlcpgwxeybpzwidjackz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gtHRqI4H2q9VwyE7sG0BKA_qJSXkJMU';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
const BRAIN_FN = `${SUPABASE_URL}/functions/v1/brain-coach`;
let CURRENT = null; // currently selected match id

// Classification of the Brain's knowledge base by title -> situational tags.
// (Persisted to ss_concepts.tags when Supabase is available; used here to power
// the Courtside tool.) SPACE / PROBLEM / SITUATION / GOAL vocabulary.
const CONCEPT_TAGS = {
  "Attack a zone from the high post": ["vs-zone","vs-2-3-zone","high-post","packed-paint","get-to-rim","ball-movement"],
  "Shot quality over shot quantity": ["any","rim","corner","get-to-rim","free-a-shooter"],
  "Translate advanced systems to a 12U level": ["any"],
  "Advantage basketball — spacing, gravity, the extra pass": ["any","spacing","ball-movement","get-to-rim","free-a-shooter","no-penetration"],
  "Shot-quality hierarchy": ["any","rim","corner","get-to-rim","free-a-shooter"],
  "Pace, space, and reads over scripted plays": ["any","spacing","transition","ball-movement","no-penetration"],
  "Triangle offense": ["vs-man","spacing","ball-movement","high-post","wing","corner","free-a-shooter"],
  "Princeton offense": ["vs-man","overplayed","high-post","get-to-rim","ball-movement","stuck-perimeter"],
  "Horns and Double Horns": ["vs-man","vs-zone","high-post","corner","get-to-rim","create-mismatch","spacing"],
  "5-out / 4-out motion (read and react)": ["vs-man","any","spacing","get-to-rim","no-penetration","ball-movement","paint"],
  "Pick-and-roll (and Spain / stack PnR)": ["vs-man","vs-switch","switching","create-mismatch","get-to-rim","high-post"],
  "Flex offense": ["vs-man","free-a-shooter","get-to-rim","wing"],
  "Dribble Drive Motion (DDM)": ["vs-man","packed-paint","no-penetration","get-to-rim","paint","spacing"],
  "Beat a 2-3 zone": ["vs-2-3-zone","vs-zone","packed-paint","high-post","corner","short-corner","get-to-rim","ball-movement","second-chance"],
  "Beat a 3-2 (or 1-2-2) zone": ["vs-3-2-zone","vs-zone","high-post","paint","short-corner","get-to-rim"],
  "Beat a 1-3-1 zone": ["vs-1-3-1","vs-zone","corner","short-corner","high-post","trapped"],
  "Beat man-to-man": ["vs-man","create-mismatch","get-to-rim","free-a-shooter","overplayed"],
  "Beat a full-court press": ["vs-press","pressured","trapped","beat-pressure","transition","get-to-rim"],
  "Beat box-and-one / triangle-and-two (junk defenses)": ["vs-junk","face-guarded","free-a-shooter","create-mismatch"],
  "Beat a switching defense": ["vs-switch","switching","create-mismatch","get-to-rim","free-a-shooter"],
  "Floppy (get your shooter open)": ["vs-man","free-a-shooter","corner","wing","stuck-perimeter"],
  "Zipper / pin-down entry": ["vs-man","pressured","free-a-shooter","top","wing"],
  "Zone overload / high-post set": ["vs-zone","vs-2-3-zone","packed-paint","high-post","short-corner","corner","get-to-rim","ball-movement"],
};
// Common in-game problems, each mapped to the tags that answer it.
const COURTSIDE_PROBLEMS = [
  { label:"Packed paint — can't reach the rim", tags:["packed-paint","get-to-rim","paint","rim","no-penetration"] },
  { label:"Denying our corners", tags:["denied-corner","corner","free-a-shooter","stuck-perimeter"] },
  { label:"Pressuring / trapping our guards", tags:["pressured","trapped","beat-pressure","vs-press"] },
  { label:"Overplaying our passing lanes", tags:["overplayed","get-to-rim"] },
  { label:"Switching everything", tags:["switching","vs-switch","create-mismatch"] },
  { label:"Face-guarding our best player", tags:["face-guarded","vs-junk","free-a-shooter"] },
  { label:"Sitting in a zone", tags:["vs-zone","high-post","packed-paint","ball-movement"] },
  { label:"We're stuck on the perimeter", tags:["stuck-perimeter","get-to-rim","no-penetration","free-a-shooter"] },
];
function matchConcepts(tags){
  if(!tags || !tags.length) return [];
  const want = new Set(tags);
  return Object.entries(CONCEPT_TAGS)
    .map(([title,ts])=>[title, ts.filter(t=>want.has(t)).length])
    .filter(([,n])=>n>0).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([t])=>t);
}

const $ = (s, r=document) => r.querySelector(s);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// ── Event normalisation ──────────────────────────────────────────────
// SuperStat event names vary; classify by substring so we're robust.
function classify(ev){
  const e = (ev||'').toLowerCase();
  if(/3|three|3pt/.test(e)) return {kind:'shot', pts:3};
  if(/free|^ft$|foul.?shot/.test(e)) return {kind:'shot', pts:1};
  if(/2|two|2pt|layup|jumper|dunk|field/.test(e)) return {kind:'shot', pts:2};
  if(/assist/.test(e)) return {kind:'assist'};
  if(/o.?reb|off.*reb/.test(e)) return {kind:'oreb'};
  if(/d.?reb|def.*reb|rebound/.test(e)) return {kind:'dreb'};
  if(/steal/.test(e)) return {kind:'steal'};
  if(/block/.test(e)) return {kind:'block'};
  if(/turnover|^to$|travel|violation/.test(e)) return {kind:'turnover'};
  if(/foul/.test(e)) return {kind:'foul'};
  return {kind:'other', raw:e};
}

function setSync(ok, msg){
  const d = $('#syncDot');
  d.querySelector('i').style.background = ok ? 'var(--accent)' : 'var(--bad)';
  d.querySelector('span').textContent = msg;
}

let MATCHES = [];

async function boot(){
  const { data, error } = await sb.from('ss_matches').select('*').order('match_date',{ascending:false});
  if(error){
    setSync(false, 'db error');
    $('#matchList').innerHTML = '<div class="mtitle">Games</div>';
    $('#content').innerHTML = emptyState(
      'Tables not found yet',
      `Run <code>schema.sql</code> in the Hoops Supabase, then <code>npm start</code> in <code>_sync/</code>.`,
      error.message);
    return;
  }
  MATCHES = data || [];
  setSync(true, `${MATCHES.length} game${MATCHES.length===1?'':'s'} synced`);
  renderList();
  if(MATCHES.length) selectMatch('season');
  else $('#content').innerHTML = emptyState(
    'No games synced yet',
    `Fill in <code>_sync/.env</code> and run <code>npm start</code>. Your SuperStat games will appear here.`);
}

function emptyState(title, html, detail){
  return `<div class="card"><div class="empty">
    <h2>${esc(title)}</h2><div>${html}</div>
    ${detail?`<div class="note" style="max-width:520px">${esc(detail)}</div>`:''}
  </div></div>`;
}

function renderList(){
  const el = $('#matchList');
  const wins = MATCHES.filter(m=>(m.result||'').toLowerCase()==='win').length;
  const losses = MATCHES.filter(m=>(m.result||'').toLowerCase()==='loss').length;
  const courtside = `<div class="match" data-id="courtside" onclick="__sel('courtside')" style="margin-bottom:6px">
      <div><div class="op" style="color:var(--accent)">⚡ Courtside</div><div class="dt">in-game tactics</div></div></div>`;
  const playbook = `<div class="match" data-id="playbook" onclick="__sel('playbook')" style="margin-bottom:6px">
      <div><div class="op">📖 Playbook</div><div class="dt">systems, plays &amp; counters</div></div></div>`;
  const season = `<div class="match" data-id="season" onclick="__sel('season')" style="margin-bottom:6px">
      <div><div class="op">Season</div><div class="dt">all ${MATCHES.length} games</div></div>
      <div class="sc">${wins}-${losses}</div></div>`;
  el.innerHTML = '<div class="mtitle">Overview</div>' + courtside + playbook + season + '<div class="mtitle">Games</div>' + MATCHES.map(m=>{
    const res = (m.result||'').toLowerCase();
    const pill = res==='win'?'<span class="pill win">W</span>':res==='loss'?'<span class="pill loss">L</span>':'';
    const sc = (m.score_for!=null&&m.score_against!=null)?`${m.score_for}–${m.score_against}`:'';
    const dt = m.match_date ? new Date(m.match_date+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric'}) : '';
    return `<div class="match" data-id="${esc(m.ss_match_id)}" onclick="__sel('${esc(m.ss_match_id)}')">
      <div><div class="op">${esc(m.opponent||m.name||'Game')}</div><div class="dt">${esc(dt)}</div></div>
      <div class="sc">${pill} ${sc}</div></div>`;
  }).join('');
}

window.__sel = selectMatch;
async function selectMatch(id){
  CURRENT = id;
  document.querySelectorAll('.match').forEach(m=>m.classList.toggle('on', m.dataset.id===id));
  if(id==='courtside'){ return renderCourtside(); }
  if(id==='playbook'){ return renderPlaybook(); }
  if(id==='season'){ return renderSeason(); }
  $('#content').innerHTML = '<div class="card"><div class="loading">Crunching the game…</div></div>';
  const m = MATCHES.find(x=>x.ss_match_id===id);
  const [{data:events},{data:roster}] = await Promise.all([
    sb.from('ss_events').select('*').eq('ss_match_id', id),
    sb.from('ss_roster').select('*').eq('ss_match_id', id),
  ]);
  renderGame(m, events||[], roster||[]);
}

// Courtside — in-game tactical assistant. Tap the problem the defense is
// causing; the Brain returns 2-3 callable tactics from the tag-matched playbook.
function renderCourtside(){
  const defOpts = ['','man to man','2-3 zone','3-2 zone','1-3-1 zone','2-1-2 zone','full-court press','box-and-one','triangle-and-two','switching everything','mixed / junk'];
  const selSty = "background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px;color:var(--txt);font-size:13px";
  $('#content').innerHTML = `
    <div class="head"><h1>⚡ Courtside</h1><span class="dt">tap what they're taking away — get tactics you can call right now</span></div>
    <div class="box">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">
        <span style="font-size:12px;color:var(--dim)">They're playing:</span>
        <select id="csDef" style="${selSty}">${defOpts.map(d=>`<option value="${d}">${d||'— any / not sure —'}</option>`).join('')}</select>
      </div>
      <div style="font-size:13px;color:var(--mut);margin-bottom:10px">What are they taking away from us?</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:8px">
        ${COURTSIDE_PROBLEMS.map((p,i)=>`<button class="cschip" onclick="__courtside(${i})">${esc(p.label)}</button>`).join('')}
      </div>
      <div style="margin:16px 0 8px;font-size:13px;color:var(--mut)">…or describe it in your words:</div>
      <div class="ask">
        <input id="csText" placeholder="e.g. they trap our ball screen and we panic" onkeydown="if(event.key==='Enter')__courtside(-1)" />
        <button onclick="__courtside(-1)">Get tactics</button>
      </div>
      <div id="csOut"></div>
      <div class="note" style="margin-top:14px">Give it ~20 seconds — the Brain is thinking through your playbook and this season's personnel. Works even mid-game before a game is synced.</div>
    </div>`;
}

window.__courtside = async (idx)=>{
  const def = $('#csDef').value;
  const problem = idx>=0 ? COURTSIDE_PROBLEMS[idx] : { label: $('#csText').value.trim(), tags: [] };
  if(idx<0 && !problem.label){ $('#csText').focus(); return; }
  const matched = matchConcepts(problem.tags);
  const out = $('#csOut');
  out.innerHTML = `<div class="insight" style="margin-top:14px"><h3>⚡ Courtside</h3><div class="note">Finding tactics for "${esc(problem.label)}"…</div></div>`;
  const q = `COURTSIDE TIMEOUT — be fast and punchy, NO preamble and no stats recap. They are taking away: "${problem.label}".${def?` They are playing a ${def}.`:''} Give me 2–3 tactics I can call RIGHT NOW: for each, name the set or action, the ONE key read, and which of our players to feature (use our season stats). Whiteboard-short — this is a 30-second timeout.${matched.length?` Draw especially from my playbook: ${matched.join('; ')}.`:''}`;
  try{
    const res = await fetch(BRAIN_FN, { method:'POST', headers:{ 'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}` }, body: JSON.stringify({ question:q }) });
    const j = await res.json();
    if(!res.ok || j.error){ out.innerHTML = `<div class="insight" style="margin-top:14px;border-color:var(--bad)"><h3 style="color:var(--bad)">Couldn't reach the Brain</h3><div class="note">${esc(j.error||res.status)}</div></div>`; return; }
    out.innerHTML = `<div class="insight" style="margin-top:14px"><h3>⚡ Call this <span class="tag">${esc(problem.label)}${def?' · '+esc(def):''}</span></h3>
      <div style="font-size:14px;line-height:1.7">${mdLite(j.answer)}</div>
      ${drawControl(j.answer,'drawName','drawOut')}</div>`;
  }catch(e){ out.innerHTML = `<div class="insight" style="margin-top:14px;border-color:var(--bad)"><h3 style="color:var(--bad)">Error</h3><div class="note">${esc(e.message)}</div></div>`; }
};

// Playbook — browse the Brain's whole knowledge base; draw up any set.
function conceptFamily(cat){
  cat=(cat||'').toLowerCase();
  if(cat==='offense-system') return {k:'systems',label:'Offensive systems',draw:true};
  if(cat==='play') return {k:'plays',label:'Set plays',draw:true};
  if(cat.indexOf('vs-')===0||cat==='vs_zone') return {k:'defense',label:'Beating each defense',draw:true};
  if(cat==='theory'||cat==='coaching'||cat==='philosophy') return {k:'theory',label:'Theory & philosophy',draw:false};
  return {k:'other',label:'Other',draw:false};
}
async function renderPlaybook(){
  $('#content').innerHTML = `<div class="head"><h1>📖 Playbook</h1><span class="dt">everything the Brain knows</span></div><div class="card"><div class="loading">Loading playbook…</div></div>`;
  const { data, error } = await sb.from('ss_concepts').select('*').eq('active',true).order('priority',{ascending:false});
  if(error){ $('#content').innerHTML = emptyState('Playbook unavailable', esc(error.message)); return; }
  const order=['systems','plays','defense','theory','other'];
  const groups={};
  (data||[]).forEach(c=>{ const f=conceptFamily(c.category); (groups[f.k]=groups[f.k]||{label:f.label,draw:f.draw,items:[]}).items.push(c); });
  let html='', idx=0;
  for(const k of order){ const g=groups[k]; if(!g) continue;
    html += `<div class="box" style="margin-bottom:14px"><h3>${esc(g.label)} <span class="sub">${g.items.length}</span></h3>`;
    g.items.forEach(c=>{
      const i=idx++;
      const tags=(CONCEPT_TAGS[c.title]||[]).filter(t=>t!=='any');
      html += `<div style="padding:11px 0;border-bottom:1px solid rgba(42,47,58,.5)">
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
          <div style="font-size:14px;font-weight:600">${esc(c.title)}</div>
          ${g.draw?`<button class="cschip" style="padding:5px 10px;font-size:12px;white-space:nowrap" onclick="__drawPb(${i},'${encodeURIComponent(c.title)}')">Draw it up ✏️</button>`:''}
        </div>
        <div style="font-size:13px;color:var(--mut);margin-top:5px;line-height:1.55">${esc(c.detail)}</div>
        ${tags.length?`<div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap">${tags.map(t=>`<span style="font-size:10.5px;color:var(--dim);background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:1px 7px">${esc(t)}</span>`).join('')}</div>`:''}
        <div id="pbOut${i}"></div>
      </div>`;
    });
    html += `</div>`;
  }
  $('#content').innerHTML = `<div class="head"><h1>📖 Playbook</h1><span class="dt">everything the Brain knows — tap “Draw it up” to diagram any set</span></div>${html}`;
}

// Aggregate every synced game into a season view.
async function renderSeason(){
  $('#content').innerHTML = '<div class="card"><div class="loading">Crunching the season…</div></div>';
  const [{data:events},{data:roster}] = await Promise.all([
    sb.from('ss_events').select('ss_match_id,roster_id,player_name,event,success,is_opposition'),
    sb.from('ss_roster').select('roster_id,first_name,last_name,player_number,is_opposition'),
  ]);
  const nameFor={}; (roster||[]).forEach(r=> nameFor[r.roster_id]=((r.first_name||'')+' '+(r.last_name||'')).trim()||('#'+(r.player_number??'')));
  const oppRoster = new Set((roster||[]).filter(r=>r.is_opposition).map(r=>r.roster_id));
  const team={pts:0,fgm:0,fga:0,tpm:0,tpa:0,ftm:0,fta:0,ast:0,reb:0,stl:0,tov:0};
  const per={}; const perGame={}; // ss_match_id -> pts
  for(const e of (events||[])){
    if(e.is_opposition || oppRoster.has(e.roster_id)) continue;
    const c=classify(e.event); const rid=e.roster_id||'?';
    const nm=nameFor[rid]||e.player_name||'Unknown';
    per[nm]=per[nm]||{name:nm,pts:0,fgm:0,fga:0,tpm:0,tpa:0,ast:0,reb:0,tov:0,g:new Set()};
    const p=per[nm]; p.g.add(e.ss_match_id);
    if(c.kind==='shot'){ const made=e.success===true;
      if(c.pts===1){p.fta=(p.fta||0)+1;team.fta++;if(made){team.ftm++;p.pts++;team.pts++;}}
      else{p.fga++;team.fga++; if(c.pts===3){p.tpa++;team.tpa++;if(made)team.tpm++,p.tpm++;} if(made){p.fgm++;team.fgm++;p.pts+=c.pts;team.pts+=c.pts;}}
    } else if(c.kind==='assist'){p.ast++;team.ast++;}
    else if(c.kind==='reb'||c.kind==='oreb'||c.kind==='dreb'){p.reb++;team.reb++;}
    else if(c.kind==='steal'){team.stl++;}
    else if(c.kind==='turnover'){p.tov++;team.tov++;}
  }
  const G = MATCHES.length || 1;
  const pct=(m,a)=>a?Math.round(100*m/a):0;
  const players = Object.values(per).filter(p=>p.pts||p.fga||p.reb||p.ast).sort((a,b)=>b.pts-a.pts);
  const wins=MATCHES.filter(m=>(m.result||'').toLowerCase()==='win').length;
  const losses=MATCHES.filter(m=>(m.result||'').toLowerCase()==='loss').length;
  const ppg=(team.pts/G).toFixed(1), topg=(team.tov/G).toFixed(1);
  // per-game scoring for a sparkline (chronological)
  const chron=[...MATCHES].filter(m=>m.score_for!=null).sort((a,b)=>(a.match_date||'').localeCompare(b.match_date||''));
  const maxS=Math.max(...chron.map(m=>Math.max(m.score_for,m.score_against)),1);
  const spark = chron.map((m,i)=>{
    const x=chron.length>1?(i/(chron.length-1))*260+10:135;
    return {x, yf:70-(m.score_for/maxS)*56, ya:70-(m.score_against/maxS)*56, win:(m.result||'').toLowerCase()==='win', m};
  });
  const path = k => spark.map((p,i)=>`${i?'L':'M'}${p.x.toFixed(0)} ${p[k].toFixed(0)}`).join(' ');

  $('#content').innerHTML = `
    <div class="head"><h1>Season</h1><span class="dt">${MATCHES.length} games · ${wins}-${losses}</span></div>
    <div class="stats">
      ${stat('Record', wins+'-'+losses, wins>losses?'good':wins<losses?'bad':'')}
      ${stat('Points / game', ppg)}
      ${stat('Field goal %', pct(team.fgm,team.fga)+'%')}
      ${stat('Free throw %', team.fta?pct(team.ftm,team.fta)+'%':'—', team.fta&&pct(team.ftm,team.fta)<55?'bad':'')}
      ${stat('Turnovers / game', topg, team.tov/G>=15?'bad':team.tov/G<=9?'good':'warn')}
      ${stat('Assists / game', (team.ast/G).toFixed(1))}
    </div>
    <div class="grid2">
      <div class="box">
        <h3>Scoring trend <span class="sub">us vs them, oldest → newest</span></h3>
        <svg viewBox="0 0 280 84" width="100%" role="img" aria-label="Scoring trend">
          <path d="${path('yf')}" fill="none" stroke="#22d3a6" stroke-width="2"/>
          <path d="${path('ya')}" fill="none" stroke="#e0603a" stroke-width="1.5" stroke-dasharray="3 3"/>
          ${spark.map(p=>`<circle cx="${p.x.toFixed(0)}" cy="${p.yf.toFixed(0)}" r="3" fill="${p.win?'#22d3a6':'#e0603a'}"/>`).join('')}
        </svg>
        <div class="legend"><span><b style="background:#22d3a6"></b>Us</span><span><b style="background:#e0603a"></b>Opponent</span></div>
      </div>
      <div class="box">
        <h3>Team totals <span class="sub">all games</span></h3>
        <table><tbody>
          <tr><td>Points</td><td>${team.pts}</td></tr>
          <tr><td>Field goals</td><td>${team.fgm}/${team.fga} (${pct(team.fgm,team.fga)}%)</td></tr>
          <tr><td>Three-pointers</td><td>${team.tpm}/${team.tpa} (${pct(team.tpm,team.tpa)}%)</td></tr>
          <tr><td>Free throws</td><td>${team.ftm}/${team.fta} (${pct(team.ftm,team.fta)}%)</td></tr>
          <tr><td>Assists / Rebounds</td><td>${team.ast} / ${team.reb}</td></tr>
          <tr><td>Steals / Turnovers</td><td>${team.stl} / ${team.tov}</td></tr>
        </tbody></table>
      </div>
    </div>
    <div class="box">
      <h3>Player season averages <span class="sub">per game</span></h3>
      <table><thead><tr><th>Player</th><th>G</th><th>PPG</th><th>FG%</th><th>3PT</th><th>RPG</th><th>APG</th><th>TOPG</th></tr></thead><tbody>
      ${players.map(p=>{const g=p.g.size||1;return `<tr><td>${esc(p.name)}</td><td>${g}</td><td>${(p.pts/g).toFixed(1)}</td><td>${pct(p.fgm,p.fga)}%</td><td>${p.tpm}/${p.tpa}</td><td>${(p.reb/g).toFixed(1)}</td><td>${(p.ast/g).toFixed(1)}</td><td>${(p.tov/g).toFixed(1)}</td></tr>`}).join('')}
      </tbody></table>
    </div>
    <div class="box">
      <h3>Ask the Brain <span class="sub">across the whole season</span></h3>
      <div class="ask">
        <input id="askq" placeholder="e.g. Which player improved most? What's our biggest recurring weakness?" onkeydown="if(event.key==='Enter')__ask()" />
        <button onclick="__ask()">Ask</button>
      </div>
      <div id="brainOut"></div>
    </div>`;
}

        if(e.x!=null && e.y!=null) shots.push({x:e.x,y:e.y,made,pts:c.pts});

      </select>
      <button onclick="__saveDefense('${esc(m.ss_match_id)}')" style="background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer">Save</button>

      ${stat('3PT', team.tpm+'/'+team.tpa)}
      ${stat('Free throw %', team.fta?pct(team.ftm,team.fta)+'%':'—')}

function stat(k,v,cls=''){return `<div class="stat"><div class="k">${esc(k)}</div><div class="v ${cls}">${esc(v)}</div></div>`;}

function boxTable(players, pct){
  if(!players.length) return '<div class="note">No player events in this game yet.</div>';
  return `<table><thead><tr><th>Player</th><th>PTS</th><th>FG</th><th>3PT</th><th>REB</th><th>AST</th><th>TO</th></tr></thead><tbody>${
    players.map((p,i)=>`<tr>
      <td>${esc(p.name)}</td><td>${p.pts}</td><td>${p.fgm}/${p.fga}</td>
      <td>${p.tpm}/${p.tpa}</td><td>${p.reb}</td><td>${p.ast}</td><td>${p.tov}</td></tr>`).join('')
  }</tbody></table>`;
}

// SuperStat x/y are normalized 0-1 across the FULL court (basket at each end).
// Fold the far end onto the near half (180° rotation) so every shot attacks the
// same rim, then plot at true court position on a fixed half-court.
function shotChart(shots){
  if(!shots.length) return '<div class="note">No shot coordinates recorded for this game.</div>';
  const W=300,H=284, pad=14;
  // rim at top-center; fx (0=baseline .. 0.5=midcourt) -> vertical, fy(0..1) -> horizontal
  const cy = fx => pad + (fx/0.5)*(H-2*pad);
  const cx = fy => pad + fy*(W-2*pad);
  let made=0;
  const dots = shots.map(s=>{
    const near = s.x < 0.5;
    const fx = near ? s.x : 1 - s.x;
    const fy = near ? s.y : 1 - s.y;
    const X = cx(fy).toFixed(1), Y = cy(fx).toFixed(1);
    if(s.made) made++;
    return s.made
      ? `<circle cx="${X}" cy="${Y}" r="5.5" fill="#22d3a6" fill-opacity=".92"/>`
      : `<circle cx="${X}" cy="${Y}" r="5" fill="none" stroke="#e0603a" stroke-width="2"/>`;
  }).join('');
  const pct = shots.length ? Math.round(100*made/shots.length) : 0;
  // half court, basket at top. key + FT circle + 3pt arc.
  return `<div class="court-wrap">
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:340px" role="img" aria-label="Half-court shot chart">
      <rect x="1" y="1" width="${W-2}" height="${H-2}" rx="6" fill="#12161d" stroke="#2a2f3a"/>
      <line x1="8" y1="14" x2="${W-8}" y2="14" stroke="#2a2f3a" stroke-width="1.5"/>
      <rect x="${W/2-26}" y="14" width="52" height="72" fill="none" stroke="#2a2f3a"/>
      <circle cx="${W/2}" cy="86" r="22" fill="none" stroke="#2a2f3a"/>
      <circle cx="${W/2}" cy="24" r="7" fill="none" stroke="#3a4150" stroke-width="1.5"/>
      <path d="M22 14 L22 40 A${W/2-22} ${W/2-22} 0 0 0 ${W-22} 40 L${W-22} 14" fill="none" stroke="#2a2f3a"/>
      ${dots}
    </svg>
    <div class="legend">
      <span><b style="background:#22d3a6"></b>Made</span>
      <span><b style="border:2px solid #e0603a;background:transparent"></b>Missed</span>
      <span style="color:var(--txt)">${made}/${shots.length} · ${pct}%</span>
    </div>
    <div class="note" style="text-align:center">Real court positions — both baskets folded to one half. Rim at top.</div>
  </div>`;
}

// Real, data-derived observations — no invented defensive schemes.
function buildInsights(team, players, shots, pct){
  const out=[];
  const fg=pct(team.fgm,team.fga), tp=pct(team.tpm,team.tpa), ft=pct(team.ftm,team.fta);
  if(team.fga){
    if(fg>=45) out.push(`Efficient night: ${fg}% from the field on ${team.fga} attempts.`);
    else if(fg<33) out.push(`Cold shooting: ${fg}% from the field — shot selection or contest quality worth a film look.`);
  }
  if(team.tpa>=5) out.push(`From three: ${team.tpm}/${team.tpa} (${tp}%).`);
  if(team.fta>=6 && ft<60) out.push(`Free throws left points on the floor: ${team.ftm}/${team.fta} (${ft}%).`);
  if(team.tov>=15) out.push(`Ball security cost you — ${team.tov} turnovers. Prime target for this week's practice.`);
  if(team.ast && team.fgm) out.push(`${Math.round(100*team.ast/team.fgm)}% of made baskets were assisted (${team.ast} assists on ${team.fgm} makes).`);
  const top=players[0];
  if(top&&top.pts) out.push(`Top scorer: ${esc(top.name)} with ${top.pts} (${top.fgm}/${top.fga} FG).`);
  const cold=players.filter(p=>p.fga>=4).sort((a,b)=>(a.fgm/a.fga)-(b.fgm/b.fga))[0];
  if(cold && cold!==top && (cold.fgm/cold.fga)<0.3) out.push(`${esc(cold.name)} struggled from the field (${cold.fgm}/${cold.fga}) — get them easier looks.`);
  if(!out.length) out.push('Not enough events synced yet to draw observations. Re-run the sync once this game finishes processing.');
  return `<div class="insight"><h3>What the data says <span class="tag">computed from real events</span></h3>
    <ul>${out.map(o=>`<li>${o}</li>`).join('')}</ul></div>`;
}

window.__ask = async (postgame)=>{

  if(!postgame && !q){ $('#askq').focus(); return; }
  const out = $('#brainOut');
  out.innerHTML = `<div class="insight" style="margin-top:12px"><h3>Brain</h3><div class="note">Thinking about ${CURRENT?'this game':'your season'}…</div></div>`;
  try{
    const res = await fetch(BRAIN_FN, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ matchId: (CURRENT && CURRENT!=='season') ? CURRENT : undefined, question: q || undefined })
    });
    if(!res.ok){
      const t = await res.text();
      out.innerHTML = `<div class="insight" style="margin-top:12px;border-color:var(--bad)"><h3 style="color:var(--bad)">Brain not reachable</h3>
        <div class="note">The <code style="color:var(--accent)">brain-coach</code> edge function isn't deployed yet (or its ANTHROPIC_API_KEY secret isn't set).
        Deploy it from <code style="color:var(--accent)">_brain/</code>, then this lights up.<br><br>${esc(t).slice(0,300)}</div></div>`;
      return;
    }
    const { answer, error } = await res.json();
    if(error){ out.innerHTML = `<div class="insight" style="margin-top:12px;border-color:var(--bad)"><h3 style="color:var(--bad)">Error</h3><div class="note">${esc(error)}</div></div>`; return; }
    out.innerHTML = `<div class="insight" style="margin-top:12px"><h3>Brain <span class="tag">${CURRENT&&CURRENT!=='season'?'this game':'season'} + your concepts</span></h3>
      <div style="font-size:14px;line-height:1.7">${mdLite(answer)}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:12px;border-top:1px solid var(--line);padding-top:10px">
        <span style="font-size:12px;color:var(--dim)">Was this useful?</span>
        <button onclick="__rate(1,this)" style="background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:14px">👍</button>
        <button onclick="__rate(-1,this)" style="background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:14px">👎</button>
        <span id="rateMsg" style="font-size:12px;color:var(--dim)"></span>
      </div>
      ${drawControl(answer,'drawName2','drawOut2')}</div>`;
    if(!postgame) $('#askq').value='';
  }catch(e){
    out.innerHTML = `<div class="insight" style="margin-top:12px;border-color:var(--bad)"><h3 style="color:var(--bad)">Couldn't reach the Brain</h3><div class="note">${esc(e.message)}</div></div>`;
  }
};

// Light markdown: ## headings, **bold**, - bullets. (Brain replies in markdown.)
function mdLite(s){
  const lines = esc(s).split('\n'); let html=''; let inList=false;
  const close=()=>{ if(inList){html+='</ul>';inList=false;} };
  for(let ln of lines){
    ln = ln.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    if(/^##+\s/.test(ln)){ close(); html+=`<div style="font-weight:600;margin:12px 0 4px">${ln.replace(/^##+\s/,'')}</div>`; }
    else if(/^[-*]\s/.test(ln)){ if(!inList){html+='<ul style="margin:4px 0;padding-left:18px">';inList=true;} html+=`<li style="margin:3px 0">${ln.replace(/^[-*]\s/,'')}</li>`; }
    else if(/^\d+\.\s/.test(ln)){ close(); html+=`<div style="margin:4px 0">${ln}</div>`; }
    else if(ln.trim()===''){ close(); html+='<div style="height:8px"></div>'; }
    else { close(); html+=`<div>${ln}</div>`; }
  }
  close(); return html;
}

// ── Play diagram engine ───────────────────────────────────────────────
// The Brain returns a JSON play spec (half-court coords x/y 0-100, rim ~[50,8]).
// We draw it on a court: circles=players, arrows=cut/pass/dribble/shot, bar=screen.
function extractJSON(t){
  if(!t) return null;
  t = t.replace(/```json/gi,'').replace(/```/g,'');
  const a=t.indexOf('{'), b=t.lastIndexOf('}');
  if(a<0||b<0) return null;
  try{ return JSON.parse(t.slice(a,b+1)); }catch(e){ return null; }
}
function playCourt(s){
  const W=320,H=304,pad=18;
  const X=x=>pad+(Math.max(0,Math.min(100,+x||0))/100)*(W-2*pad);
  const Y=y=>pad+(Math.max(0,Math.min(100,+y||0))/100)*(H-2*pad);
  const players=s.players||[]; const byId={}; players.forEach(p=>byId[String(p.label)]=p);
  const P=id=>byId[String(id)]; const rim={x:50,y:8};
  const arrow=(x1,y1,x2,y2,c,dash)=>`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${c}" stroke-width="2" ${dash?`stroke-dasharray="${dash}"`:''} marker-end="url(#ah)"/>`;
  const poly=(path,c,arrowEnd)=>{ if(!path||path.length<2) return ''; const d=path.map((p,i)=>`${i?'L':'M'}${X(p[0]).toFixed(1)} ${Y(p[1]).toFixed(1)}`).join(' '); return `<path d="${d}" fill="none" stroke="${c}" stroke-width="2" ${arrowEnd?'marker-end="url(#ah)"':''}/>`; };
  const zig=(path,c)=>{ if(!path||path.length<2) return ''; const pts=[]; for(let i=0;i<path.length-1;i++){ const x1=X(path[i][0]),y1=Y(path[i][1]),x2=X(path[i+1][0]),y2=Y(path[i+1][1]); const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1,px=-dy/len,py=dx/len; const steps=Math.max(2,Math.round(len/10)); for(let sN=(i?1:0);sN<=steps;sN++){ const t=sN/steps,bx=x1+dx*t,by=y1+dy*t,off=(sN===0||sN===steps)?0:((sN%2)?4:-4); pts.push([bx+px*off,by+py*off]); } } const d=pts.map((p,k)=>`${k?'L':'M'}${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' '); return `<path d="${d}" fill="none" stroke="${c}" stroke-width="2" marker-end="url(#ah)"/>`; };
  let el='';
  el+=`<rect x="1" y="1" width="${W-2}" height="${H-2}" rx="8" fill="#12161d" stroke="#2a2f3a"/>`;
  el+=`<line x1="10" y1="${Y(2)}" x2="${W-10}" y2="${Y(2)}" stroke="#2a2f3a" stroke-width="1.5"/>`;
  el+=`<rect x="${X(38)}" y="${Y(2)}" width="${(X(62)-X(38)).toFixed(1)}" height="${(Y(40)-Y(2)).toFixed(1)}" fill="none" stroke="#2a2f3a"/>`;
  el+=`<circle cx="${X(50)}" cy="${Y(40)}" r="${((X(62)-X(38))/2).toFixed(1)}" fill="none" stroke="#2a2f3a"/>`;
  el+=`<circle cx="${X(50)}" cy="${Y(7)}" r="5" fill="none" stroke="#3a4150" stroke-width="1.5"/>`;
  el+=`<path d="M ${X(8)} ${Y(2)} L ${X(8)} ${Y(24)} A ${(X(50)-X(8)).toFixed(1)} ${(X(50)-X(8)).toFixed(1)} 0 0 0 ${X(92)} ${Y(24)} L ${X(92)} ${Y(2)}" fill="none" stroke="#2a2f3a"/>`;
  const at=o=>o&&o.length>=2?{x:o[0],y:o[1]}:null;
  (s.actions||[]).forEach(a=>{
    const ty=(a.type||'').toLowerCase();
    if(ty==='pass'){ const f=P(a.from),t=P(a.to); if(f&&t) el+=arrow(X(f.x),Y(f.y),X(t.x),Y(t.y),'#4f8fe0','5 4'); }
    else if(ty==='shot'){ const f=a.who?P(a.who):null; const from=f?{x:f.x,y:f.y}:(at(a.at)||{x:50,y:35}); el+=arrow(X(from.x),Y(from.y),X(rim.x),Y(rim.y),'#22d3a6',''); }
    else if(ty==='cut'||ty==='move'||ty==='drive'){ el+= (ty==='drive') ? zig(a.path,'#eaa640') : poly(a.path,'#e8ebf0',true); }
    else if(ty==='dribble'){ el+=zig(a.path,'#eaa640'); }
    else if(ty==='screen'){ const pt=at(a.at)||(a.who&&P(a.who)?{x:P(a.who).x,y:P(a.who).y}:null); if(pt) el+=`<line x1="${(X(pt.x)-11).toFixed(1)}" y1="${Y(pt.y).toFixed(1)}" x2="${(X(pt.x)+11).toFixed(1)}" y2="${Y(pt.y).toFixed(1)}" stroke="#d4537e" stroke-width="3"/>`; }
  });
  players.forEach(p=>{ el+=`<circle cx="${X(p.x)}" cy="${Y(p.y)}" r="11" fill="#1e232c" stroke="#22d3a6" stroke-width="1.5"/><text x="${X(p.x)}" y="${(Y(p.y)+4).toFixed(1)}" text-anchor="middle" font-size="12" fill="#e8ebf0" font-weight="600">${esc(p.label)}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-width:330px" role="img" aria-label="Play diagram"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>${el}</svg>`;
}
window.__draw = (id)=>{ const el=$('#'+(id||'drawName')); const n=el?el.value.trim():''; if(n){ const outId=(id==='drawName2')?'drawOut2':'drawOut'; drawPlay(n, outId, ($('#csDef')&&$('#csDef').value)||''); } };
window.__drawPb = (i, title)=> drawPlay(decodeURIComponent(title), 'pbOut'+i, '');
async function drawPlay(name, outId, def){
  const out=$('#'+outId); if(!out) return;
  def = def || '';
  out.innerHTML=`<div class="note" style="margin-top:10px">Drawing up "${esc(name)}"…</div>`;
  const q=`Ignore any formatting rules in your system prompt for THIS reply. Output ONLY a JSON object — no prose, no markdown fences — diagramming the basketball play "${name}"${def?` run against a ${def}`:''}. Half-court coordinates: x 0(left) to 100(right), y 0(baseline, our rim end) to 100(half-court line); the rim is near [50,8]. Schema exactly: {"name":"...","players":[{"label":"1","x":50,"y":75}],"actions":[{"type":"screen","who":"5","at":[42,30]},{"type":"dribble","who":"1","path":[[50,80],[40,55]]},{"type":"pass","from":"1","to":"4"},{"type":"cut","who":"2","path":[[12,78],[12,20]]},{"type":"shot","who":"5","at":[45,14]}],"note":"one short coaching cue"}. Action types: screen, dribble, pass, cut, shot. Include all 5 offensive players (labels 1-5) with realistic spacing, the primary action, and the shot it creates. Keep it simple for a 12U team.`;
  try{
    const res=await fetch(BRAIN_FN,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({question:q})});
    const j=await res.json();
    if(j.error){ out.innerHTML=`<div class="note" style="color:var(--bad);margin-top:10px">${esc(j.error)}</div>`; return; }
    const spec=extractJSON(j.answer);
    if(!spec||!Array.isArray(spec.players)||!spec.players.length){ out.innerHTML=`<div class="note" style="color:var(--bad);margin-top:10px">Couldn't parse that into a diagram — try a clearer set name.</div>`; return; }
    out.innerHTML=`<div class="box" style="margin-top:12px;background:var(--panel2)"><h3>✏️ ${esc(spec.name||name)}</h3>
      <div style="display:flex;justify-content:center">${playCourt(spec)}</div>
      ${spec.note?`<div class="note" style="text-align:center;margin-top:8px;color:var(--mut)">${esc(spec.note)}</div>`:''}
      <div class="legend" style="justify-content:center;flex-wrap:wrap;gap:12px">
        <span><b style="background:#e8ebf0"></b>cut</span><span><b style="background:#eaa640"></b>dribble</span>
        <span><b style="background:#4f8fe0"></b>pass</span><span><b style="background:#d4537e"></b>screen</span>
        <span><b style="background:#22d3a6"></b>shot</span></div></div>`;
  }catch(e){ out.innerHTML=`<div class="note" style="color:var(--bad);margin-top:10px">${esc(e.message)}</div>`; }
}
function drawControl(answer, inputId, outId){
  let first=((answer||'').match(/\*\*(.+?)\*\*/)||[])[1]||'';
  first=first.split(/[—–-]/)[0].trim();
  return `<div style="margin-top:12px;border-top:1px solid var(--line);padding-top:10px">
    <div style="font-size:12px;color:var(--dim);margin-bottom:6px">Want to see it drawn up?</div>
    <div class="ask"><input id="${inputId}" value="${esc(first)}" placeholder="play name to diagram" onkeydown="if(event.key==='Enter')__draw('${inputId}')" /><button onclick="__draw('${inputId}')">Draw it up ✏️</button></div>
    <div id="${outId}"></div></div>`;
}

window.__rate = async (val, btn)=>{
  const msg = $('#rateMsg');
  const { data } = await sb.from('ss_insights').select('id')
    .eq('ss_match_id', CURRENT==='season'?null:CURRENT).order('created_at',{ascending:false}).limit(1);
  if(!data || !data.length){ if(msg) msg.textContent='(nothing to rate yet)'; return; }
  const { error } = await sb.from('ss_insights').update({ rating: val }).eq('id', data[0].id);
  if(msg) msg.textContent = error ? 'save failed' : (val>0?'Thanks — noted 👍':'Got it — the Brain will learn from this');
  if(btn && btn.parentElement){ btn.parentElement.querySelectorAll('button').forEach(b=>b.style.opacity='.4'); btn.style.opacity='1'; }
};

window.__saveDefense = async (id)=>{
  const val = $('#defSel').value;
  const msg = $('#defMsg');
  if(msg) msg.textContent = 'saving…';
  try{
    const res = await fetch(BRAIN_FN, {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'apikey':SUPABASE_KEY, 'Authorization':`Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ setDefense: { matchId: id, defense: val } })
    });
    const j = await res.json();
    if(msg) msg.textContent = j.ok ? (val?'saved — Brain now knows':'cleared') : ('save failed: '+(j.error||res.status));
  }catch(e){ if(msg) msg.textContent = 'save failed: '+e.message; }
  const mm = MATCHES.find(x=>x.ss_match_id===id); if(mm) mm.defense_faced = val || null;
};

async function loadConcepts(){
  const el = $('#conceptList');
  if(!el) return;
  const { data, error } = await sb.from('ss_concepts').select('*').eq('active',true).order('priority',{ascending:false});
  if(error){ el.innerHTML = `<span style="color:var(--bad)">Concepts table not found — run <code>_brain/concepts.sql</code>.</span>`; return; }
  if(!data.length){ el.innerHTML = 'No concepts yet. Add your first below — it will shape every analysis.'; return; }
  el.innerHTML = data.map(c=>`<div style="padding:8px 0;border-bottom:1px solid rgba(42,47,58,.5)">
    <span style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.05em">${esc(c.category||'')}</span>
    <div style="font-size:13.5px;font-weight:600">${esc(c.title)}</div>
    <div style="font-size:13px;color:var(--mut)">${esc(c.detail)}</div></div>`).join('');
}

window.__addConcept = async ()=>{
  const category=$('#cCat').value.trim(), title=$('#cTitle').value.trim(), detail=$('#cDetail').value.trim();
  if(!title||!detail){ alert('A title and the concept detail are both needed.'); return; }
  const { error } = await sb.from('ss_concepts').insert({ category:category||'general', title, detail, priority:1 });
  if(error){ alert('Save failed: '+error.message); return; }
  $('#cCat').value=''; $('#cTitle').value=''; $('#cDetail').value='';
  loadConcepts();
};

boot().catch(e=>{ setSync(false,'error'); $('#content').innerHTML = emptyState('Something went wrong', esc(e.message)); });
</script>
