<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<title>Playmaker • Hoops — Warriors</title>
<meta name="theme-color" content="#d4af37" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hoops" />
<style>
  :root {
    --bg: #07090d;
    --bg-2: #0c1018;
    --panel: rgba(20, 26, 36, 0.72);
    --panel-solid: #141a24;
    --panel-2: #1a2230;
    --panel-3: #232c3e;
    --border: rgba(212, 175, 55, 0.14);
    --border-strong: rgba(212, 175, 55, 0.32);
    --ink: #f4f1ea;
    --ink-2: #d6d2c6;
    --muted: #8a8f99;
    --muted-2: #5d6573;
    --gold: #d4af37;
    --gold-2: #f0c75e;
    --gold-glow: rgba(212, 175, 55, 0.28);
    --made: #4ade80;
    --made-glow: rgba(74, 222, 128, 0.28);
    --missed: #ef4444;
    --missed-glow: rgba(239, 68, 68, 0.28);
    --court-1: #c2884c;
    --court-2: #a06b34;
    --court-3: #8c5a28;
    --court-line: rgba(15, 12, 6, 0.78);
    --shadow-md: 0 8px 24px rgba(0,0,0,0.5);
    --shadow-lg: 0 24px 60px rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; touch-action: manipulation; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(ellipse at top left, rgba(212, 175, 55, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(44, 92, 255, 0.06), transparent 50%),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
    letter-spacing: 0.01em;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select { font-family: inherit; }

  /* ---------- Header ---------- */
  header.app-header {
    padding: 12px 18px;
    background: linear-gradient(180deg, rgba(20,26,36,0.95), rgba(20,26,36,0.7)), var(--bg-2);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    position: sticky;
    top: 0; z-index: 50;
  }
  @media (max-width: 720px) {
    header.app-header { padding: 10px 12px; gap: 8px; }
    .brand-sub { display: none; }
    .brand-mark { width: 30px; height: 30px; }
    .brand-name { font-size: 14px; }
    .nav-btn { padding: 6px 10px; font-size: 11px; letter-spacing: 0.08em; }
    main {
      padding: 14px 12px;
      padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
    }
  }
  html, body { overflow-x: hidden; }
  header.app-header::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
  }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, var(--gold), #b8902e);
    display: flex; align-items: center; justify-content: center;
    color: #1a1208; font-weight: 800; font-size: 15px;
    box-shadow: 0 0 18px var(--gold-glow), inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-name {
    font-family: "Cinzel", "Playfair Display", Georgia, serif;
    font-weight: 700; font-size: 15px; letter-spacing: 0.16em; color: var(--gold-2);
  }
  .brand-sub { font-size: 10px; letter-spacing: 0.22em; color: var(--muted); text-transform: uppercase; }
  .header-spacer { flex: 1; }
  .nav-btn {
    background: transparent; border: 1px solid var(--border-strong);
    color: var(--ink); padding: 8px 14px; border-radius: 9px;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600;
    transition: all 0.2s;
  }
  .nav-btn:hover, .nav-btn.active { background: var(--gold); color: #1a1208; border-color: var(--gold); }
  .nav-btn.danger:hover { background: var(--missed); color: white; border-color: var(--missed); }

  /* ---------- Sync status pill ---------- */
  .sync-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 11px; border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: rgba(255,255,255,0.03);
    color: var(--ink); font-size: 11px; letter-spacing: 0.08em; font-weight: 700;
    cursor: pointer; transition: all .15s;
    font-family: inherit; text-transform: uppercase;
  }
  .sync-pill:hover { background: rgba(255,255,255,0.07); }
  .sync-pill-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--muted); flex: none;
  }
  .sync-pill[data-state="synced"]  { border-color: rgba(63,185,132,0.5); color: #6bd49a; }
  .sync-pill[data-state="synced"]  .sync-pill-dot { background: #3fb984; box-shadow: 0 0 8px #3fb984; }
  .sync-pill[data-state="pending"] { border-color: rgba(212,175,55,0.5); color: var(--gold-2); }
  .sync-pill[data-state="pending"] .sync-pill-dot { background: var(--gold); box-shadow: 0 0 8px var(--gold-glow); animation: pulse 1.4s ease-in-out infinite; }
  .sync-pill[data-state="offline"] { border-color: rgba(255,106,31,0.55); color: #ffb892; background: rgba(255,106,31,0.10); }
  .sync-pill[data-state="offline"] .sync-pill-dot { background: var(--accent); box-shadow: 0 0 8px rgba(255,106,31,0.6); }
  .sync-pill[data-state="error"]   { border-color: rgba(240,87,79,0.55); color: #f0746c; }
  .sync-pill[data-state="error"]   .sync-pill-dot { background: #f0746c; box-shadow: 0 0 8px rgba(240,87,79,0.5); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @media (max-width: 720px) {
    .sync-pill { padding: 5px 9px; font-size: 10px; }
    .sync-pill-label { display: none; }
  }

  /* ---------- Sync Center modal ---------- */
  .sync-center { display: flex; flex-direction: column; gap: 14px; }
  .sync-status-block {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: 12px;
    border: 1px solid var(--border-strong);
    background: rgba(255,255,255,0.03);
  }
  .sync-status-block.synced  { border-color: rgba(63,185,132,0.45); background: rgba(63,185,132,0.08); }
  .sync-status-block.pending { border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.08); }
  .sync-status-block.offline { border-color: rgba(255,106,31,0.5); background: rgba(255,106,31,0.10); }
  .sync-status-block.error   { border-color: rgba(240,87,79,0.4); background: rgba(240,87,79,0.10); }
  .sync-status-icon { font-size: 28px; line-height: 1; }
  .sync-status-text { flex: 1; }
  .sync-status-title { font-size: 14px; font-weight: 800; letter-spacing: 0.06em; margin-bottom: 3px; }
  .sync-status-sub { font-size: 12px; color: var(--ink-2); }
  .sync-toggle-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: 10px;
    background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  }
  .sync-toggle-row label { flex: 1; font-weight: 700; font-size: 13px; color: var(--ink); }
  .sync-toggle-row .hint { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; }
  .sync-switch {
    position: relative; display: inline-block; width: 50px; height: 28px; cursor: pointer;
    flex: none;
  }
  .sync-switch input { opacity: 0; width: 0; height: 0; }
  .sync-switch-track {
    position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 999px;
    transition: background .2s;
  }
  .sync-switch-thumb {
    position: absolute; top: 3px; left: 3px; width: 22px; height: 22px; border-radius: 50%;
    background: #f4f1ea; transition: transform .2s;
  }
  .sync-switch input:checked + .sync-switch-track { background: var(--accent); }
  .sync-switch input:checked + .sync-switch-track .sync-switch-thumb { transform: translateX(22px); }
  .sync-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sync-actions .btn { padding: 11px 12px; font-size: 12px; }
  .sync-pending-list {
    margin-top: 6px; max-height: 36vh; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 10px;
    background: rgba(0,0,0,0.2);
  }
  .sync-pending-item {
    display: grid; grid-template-columns: 70px 70px 1fr; gap: 10px; align-items: center;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--ink-2);
  }
  .sync-pending-item:last-child { border-bottom: none; }
  .sync-pending-item .op {
    padding: 2px 8px; border-radius: 6px; font-weight: 800; letter-spacing: 0.06em;
    text-align: center; font-size: 10px;
  }
  .sync-pending-item .op.upsert { background: rgba(63,185,132,0.18); color: #6bd49a; }
  .sync-pending-item .op.delete { background: rgba(240,87,79,0.18); color: #f0746c; }
  .sync-pending-item .tbl { color: var(--gold-2); font-weight: 700; }
  .sync-pending-item .err { color: #f0746c; font-size: 10px; }

  /* ---------- Layout ---------- */
  main {
    padding: 18px;
    padding-bottom: calc(60px + env(safe-area-inset-bottom, 0px));
    max-width: 1600px; margin: 0 auto;
  }
  h2 { font-size: 22px; margin: 0 0 14px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-2); font-weight: 700; }
  h3 { font-size: 15px; margin: 0 0 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); font-weight: 600; }

  /* ---------- Cards ---------- */
  .card {
    background: var(--panel); backdrop-filter: blur(8px);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; box-shadow: var(--shadow-md);
  }
  .card.elev { box-shadow: var(--shadow-lg); }

  /* ---------- Home ---------- */
  .home-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
  .games-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .game-card {
    background: linear-gradient(135deg, var(--panel-solid), var(--panel-2));
    border: 1px solid var(--border); border-radius: 14px; padding: 16px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .game-card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .game-card .gc-date { font-size: 12px; letter-spacing: 0.16em; color: var(--gold-2); text-transform: uppercase; margin-bottom: 6px; }
  .game-card .gc-vs { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .game-card .gc-score { font-size: 28px; font-weight: 800; letter-spacing: 0.05em; font-variant-numeric: tabular-nums; }
  .game-card .gc-result {
    display: inline-block; margin-top: 6px; padding: 3px 10px; border-radius: 6px;
    font-size: 11px; letter-spacing: 0.16em; font-weight: 700; text-transform: uppercase;
  }
  .gc-result.win { background: rgba(74,222,128,0.15); color: var(--made); }
  .gc-result.loss { background: rgba(239,68,68,0.15); color: var(--missed); }
  .gc-result.tie { background: rgba(212,175,55,0.15); color: var(--gold-2); }
  .gc-delete {
    position: absolute; top: 10px; right: 10px;
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: var(--missed); width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    opacity: 0; transition: opacity 0.2s;
  }
  .game-card:hover .gc-delete { opacity: 1; }

  .new-game-card {
    background: linear-gradient(135deg, rgba(212,175,55,0.08), rgba(212,175,55,0.02));
    border: 2px dashed var(--border-strong); border-radius: 14px; padding: 24px;
    cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
    min-height: 140px; color: var(--gold-2); font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; font-size: 14px;
  }
  .new-game-card:hover { border-color: var(--gold); background: rgba(212,175,55,0.1); }
  .new-game-card .ng-plus { font-size: 36px; line-height: 1; }

  /* ---------- Game view ---------- */
  .game-header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .scoreline {
    display: flex; align-items: center; gap: 18px;
    background: var(--panel-solid); border: 1px solid var(--border);
    padding: 10px 18px; border-radius: 12px;
  }
  .scoreline .team-name { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .scoreline .team-score {
    font-size: 36px; font-weight: 800; font-variant-numeric: tabular-nums;
    line-height: 1; letter-spacing: 0.04em;
  }
  .scoreline .team-us .team-score { color: var(--gold-2); }
  .scoreline .team-them .team-score { color: var(--ink); }
  .scoreline .vs-dash { color: var(--muted); font-size: 22px; }
  .game-meta { font-size: 12px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }
  .game-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .quarter-tabs {
    display: flex; gap: 0; background: var(--panel-solid); border: 1px solid var(--border);
    border-radius: 12px; padding: 4px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .quarter-tab {
    flex: 1; min-width: 80px; padding: 10px 14px; border-radius: 9px; border: 0;
    background: transparent; color: var(--ink-2); font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase; font-size: 12px; transition: all 0.2s;
  }
  .quarter-tab.active {
    background: linear-gradient(180deg, var(--gold), #b8902e); color: #1a1208;
    box-shadow: 0 0 14px var(--gold-glow);
  }
  .quarter-tab .qt-score {
    display: block; font-size: 16px; font-weight: 800; margin-top: 2px;
    font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
  }

  /* Quarter layout */
  .quarter-layout {
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 420px);
    gap: 16px; align-items: start;
  }
  @media (max-width: 1100px) {
    .quarter-layout { grid-template-columns: 1fr; }
  }

  /* Court */
  .court-wrap { position: relative; }
  .clock-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel-solid); border: 1px solid var(--border);
    padding: 10px 14px; border-radius: 12px; margin-bottom: 10px;
  }
  .clock-display {
    font-family: "SF Mono", Menlo, monospace; font-size: 28px; font-weight: 800;
    color: var(--gold-2); letter-spacing: 0.08em; cursor: pointer;
    padding: 4px 12px; border-radius: 8px; transition: background 0.2s;
  }
  .clock-display:hover { background: rgba(212,175,55,0.1); }
  .clock-label { font-size: 10px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }

  .court-svg {
    width: 100%; height: auto; display: block;
    border-radius: 14px; box-shadow: var(--shadow-lg);
    background: linear-gradient(180deg, var(--court-1), var(--court-2) 60%, var(--court-3));
    cursor: crosshair; touch-action: manipulation;
  }
  .court-overlay-msg {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85); color: var(--gold-2); padding: 14px 22px;
    border-radius: 10px; font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase;
    border: 1px solid var(--border-strong); pointer-events: none;
    text-align: center; max-width: 80%;
  }
  .shot-dot { transition: r 0.15s; cursor: pointer; pointer-events: all; }
  .shot-dot:hover { r: 11; }
  .shot-dot.made { fill: var(--made); stroke: white; stroke-width: 1.5; }
  .shot-dot.missed { fill: none; stroke: var(--missed); stroke-width: 3.5; }
  .shot-dot.them.made { fill: var(--missed); stroke: rgba(0,0,0,0.4); }
  .shot-dot.them.missed { fill: none; stroke: rgba(255,255,255,0.5); }
  .summary-court { cursor: default; max-width: 560px; margin: 0 auto; }
  .shot-legend {
    display: flex; flex-wrap: wrap; gap: 14px; justify-content: center;
    font-size: 11px; letter-spacing: 0.08em; color: var(--ink-2);
    margin: 8px 0 12px; padding: 8px 4px;
    border-bottom: 1px solid var(--border);
  }
  .shot-legend > span { display: inline-flex; align-items: center; gap: 6px; }
  .lg-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
  .lg-dot.lg-us-made { background: var(--made); border: 1.5px solid #fff; }
  .lg-dot.lg-us-miss { background: transparent; border: 2.5px solid var(--missed); }
  .lg-dot.lg-them-made { background: var(--missed); border: 1.5px solid rgba(0,0,0,0.4); }
  .lg-dot.lg-them-miss { background: transparent; border: 2.5px solid rgba(255,255,255,0.5); }

  /* Right panel */
  .panel-section { margin-bottom: 14px; }
  .on-floor-grid { display: grid; gap: 8px; }
  .player-card {
    background: linear-gradient(135deg, var(--panel-solid), var(--panel-2));
    border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px;
    transition: all 0.2s;
  }
  .player-card:hover { border-color: var(--border-strong); }
  .pc-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .pc-jersey {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--gold), #b8902e); color: #1a1208;
    font-weight: 800; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .pc-name { flex: 1; font-weight: 700; font-size: 14px; }
  .pc-pts { font-size: 12px; color: var(--muted); letter-spacing: 0.12em; }
  .pc-pts strong { color: var(--gold-2); font-weight: 700; }
  .pc-sub-btn {
    background: transparent; border: 1px solid var(--border-strong); color: var(--ink-2);
    padding: 4px 10px; border-radius: 6px; font-size: 10px; letter-spacing: 0.16em;
    text-transform: uppercase; font-weight: 600;
  }
  .pc-sub-btn:hover { background: rgba(212,175,55,0.1); border-color: var(--gold); color: var(--gold-2); }
  .pc-remove-btn {
    background: transparent; border: 1px solid var(--border-strong); color: var(--muted);
    padding: 2px 8px; border-radius: 6px; font-size: 14px; line-height: 1;
    cursor: pointer; margin-left: 4px;
  }
  .pc-remove-btn:hover { background: rgba(240,87,79,0.12); border-color: rgba(240,87,79,0.55); color: #f0746c; }
  .pc-stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  .stat-btn {
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 6px; display: flex; align-items: center; justify-content: space-between;
    font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-2); user-select: none;
  }
  .stat-btn .sb-label { font-weight: 700; color: var(--gold-2); flex: 1; text-align: left; }
  .stat-btn .sb-val { font-weight: 800; font-variant-numeric: tabular-nums; min-width: 16px; text-align: center; color: var(--ink); }
  .stat-btn .sb-minus, .stat-btn .sb-plus {
    width: 22px; height: 22px; border-radius: 5px; border: 0;
    background: rgba(255,255,255,0.06); color: var(--ink); font-weight: 800; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
  }
  .stat-btn .sb-plus { background: rgba(74,222,128,0.18); color: var(--made); }
  .stat-btn .sb-minus { background: rgba(239,68,68,0.15); color: var(--missed); }
  .stat-btn .sb-plus:hover { background: rgba(74,222,128,0.3); }
  .stat-btn .sb-minus:hover { background: rgba(239,68,68,0.25); }

  .empty-slot {
    background: rgba(255,255,255,0.02); border: 2px dashed var(--border);
    border-radius: 12px; padding: 18px; text-align: center; cursor: pointer;
    color: var(--muted); font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase;
    transition: all 0.2s;
  }
  .empty-slot:hover { border-color: var(--gold); color: var(--gold-2); background: rgba(212,175,55,0.05); }

  .bench-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .bench-chip {
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px; font-size: 12px;
    color: var(--ink-2); cursor: pointer; transition: all 0.2s;
  }
  .bench-chip:hover { background: rgba(212,175,55,0.1); border-color: var(--gold); color: var(--gold-2); }

  .opponent-bar {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }

  /* ---------- Modal ---------- */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.78);
    backdrop-filter: blur(6px); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; animation: fadeIn 0.15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: linear-gradient(135deg, var(--panel-solid), var(--panel-2));
    border: 1px solid var(--border-strong); border-radius: 16px;
    padding: 22px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .modal-lg { max-width: 640px; }
  .modal h3 { color: var(--gold-2); margin-top: 0; font-size: 14px; letter-spacing: 0.18em; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .modal-actions button { flex: 1; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select {
    width: 100%; padding: 10px 12px; border-radius: 9px;
    background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--ink);
    font-size: 14px;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--gold); }

  .btn {
    padding: 12px 18px; border-radius: 10px; font-weight: 700; font-size: 13px;
    letter-spacing: 0.14em; text-transform: uppercase; transition: all 0.15s;
    border: 1px solid var(--border-strong); background: transparent; color: var(--ink);
  }
  .btn:hover { background: rgba(255,255,255,0.04); }
  .btn-primary {
    background: linear-gradient(180deg, var(--gold), #b8902e); color: #1a1208;
    border-color: var(--gold); box-shadow: 0 0 14px var(--gold-glow);
  }
  .btn-primary:hover { background: linear-gradient(180deg, var(--gold-2), var(--gold)); }
  .btn-made { background: linear-gradient(180deg, #5be59a, #2eb86b); color: #052f14; border-color: var(--made); }
  .btn-missed { background: linear-gradient(180deg, #ff6b6b, #c92020); color: white; border-color: var(--missed); }
  .btn-big { padding: 22px 18px; font-size: 18px; letter-spacing: 0.2em; }
  .btn-ghost { background: transparent; border-color: var(--border); color: var(--ink-2); }
  .btn-danger { background: linear-gradient(180deg, #c14d44, #8a2a23); color: #fff; border-color: rgba(240,87,79,0.6); }
  .btn-danger:hover { background: linear-gradient(180deg, #d05b52, #a03028); }

  /* Shot modal */
  .team-toggle {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    background: var(--panel-3); border-radius: 10px; padding: 4px; margin-bottom: 14px;
  }
  .team-toggle button {
    padding: 10px; border-radius: 8px; border: 0; background: transparent;
    color: var(--ink-2); font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; font-size: 12px;
  }
  .team-toggle button.active { background: var(--gold); color: #1a1208; }

  .player-pick-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px;
    margin-bottom: 14px;
  }
  .player-pick {
    background: rgba(255,255,255,0.04); border: 2px solid var(--border);
    border-radius: 10px; padding: 12px 8px; cursor: pointer;
    text-align: center; transition: all 0.15s;
  }
  .player-pick:hover { border-color: var(--border-strong); }
  .player-pick.active {
    border-color: var(--gold); background: rgba(212,175,55,0.15);
    box-shadow: 0 0 14px var(--gold-glow);
  }
  .player-pick .pp-num {
    font-size: 22px; font-weight: 800; color: var(--gold-2); line-height: 1; margin-bottom: 4px;
  }
  .player-pick .pp-name { font-size: 11px; color: var(--ink-2); }

  .made-missed-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .override-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel-solid); border: 1px solid var(--border-strong);
    color: var(--gold-2); padding: 12px 22px; border-radius: 10px;
    font-size: 13px; letter-spacing: 0.1em; box-shadow: var(--shadow-lg);
    z-index: 300; animation: toastIn 0.2s;
  }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }

  .flash { animation: flash 0.6s; }
  @keyframes flash {
    0% { background-color: transparent; }
    20% { background-color: var(--made-glow); }
    100% { background-color: transparent; }
  }
  .flash-miss { animation: flashMiss 0.6s; }
  @keyframes flashMiss {
    0% { background-color: transparent; }
    20% { background-color: var(--missed-glow); }
    100% { background-color: transparent; }
  }

  /* Roster view */
  .roster-list { display: grid; gap: 8px; }
  .roster-row {
    display: grid; grid-template-columns: 50px 70px 1fr auto; gap: 10px; align-items: center;
    background: var(--panel-solid); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
  }
  .roster-row input[type=text], .roster-row input[type=number], .roster-row select {
    background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--ink);
    padding: 6px 10px; border-radius: 7px; font-size: 13px;
    font-family: inherit;
  }
  .roster-row input[type=number] { width: 60px; }
  .roster-row select { width: 70px; -webkit-appearance: none; appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 22px;
  }

  /* Player detail */
  .pd-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; }
  @media (max-width: 900px) { .pd-grid { grid-template-columns: 1fr; } }
  .stat-block {
    background: var(--panel-solid); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; text-align: center;
  }
  .stat-block .sb-num { font-size: 30px; font-weight: 800; color: var(--gold-2); font-variant-numeric: tabular-nums; }
  .stat-block .sb-lbl { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .totals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; }

  .zone-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .zone-table th, .zone-table td { padding: 8px 6px; text-align: left; border-bottom: 1px solid var(--border); }
  .zone-table th { color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-size: 10px; font-weight: 600; }
  .zone-table td:not(:first-child), .zone-table th:not(:first-child) { text-align: center; font-variant-numeric: tabular-nums; }

  .summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .summary-table th, .summary-table td { padding: 8px 6px; border-bottom: 1px solid var(--border); }
  .summary-table th { color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-size: 10px; font-weight: 600; text-align: center; }
  .summary-table td { font-variant-numeric: tabular-nums; text-align: center; }
  .summary-table td:first-child, .summary-table th:first-child { text-align: left; }
  .summary-table .name-cell { font-weight: 700; }
  .summary-table .name-cell-row { display: flex; align-items: center; gap: 6px; }
  .summary-table .sum-name {
    cursor: pointer; padding: 2px 6px; border-radius: 5px;
    transition: background 0.12s, color 0.12s;
  }
  .summary-table .sum-name:hover { background: rgba(212,175,55,0.12); color: var(--gold-2); }
  .summary-table .name-cell.active-filter .sum-name {
    background: var(--gold); color: #1a1208;
  }
  .summary-table .sum-name-detail {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    width: 22px; height: 22px; border-radius: 5px; font-size: 11px; line-height: 1;
    cursor: pointer; padding: 0; display: inline-flex; align-items: center; justify-content: center;
  }
  .summary-table .sum-name-detail:hover { color: var(--gold-2); border-color: var(--gold); }
  .summary-table .pm-pos { color: var(--made); font-weight: 700; }
  .summary-table .pm-neg { color: var(--missed); font-weight: 700; }

  .loader {
    display: flex; align-items: center; justify-content: center; padding: 80px 20px;
    color: var(--muted); letter-spacing: 0.16em; text-transform: uppercase; font-size: 13px;
  }

  .pill {
    display: inline-block; padding: 2px 10px; border-radius: 999px;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;
  }
  .pill.full { background: rgba(74,222,128,0.18); color: var(--made); }
  .pill.partial { background: rgba(240,199,94,0.18); color: var(--gold-2); }

  .iconbtn {
    background: transparent; border: 1px solid var(--border); color: var(--ink-2);
    width: 34px; height: 34px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .iconbtn:hover { border-color: var(--gold); color: var(--gold-2); }

  .err-banner {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
    color: var(--missed); padding: 10px 14px; border-radius: 9px; font-size: 13px; margin-bottom: 12px;
  }

  /* Workout view */
  .wo-wrap { display: grid; gap: 16px; }
  .wo-timer-card {
    background: linear-gradient(180deg, rgba(20,26,36,0.95), rgba(12,16,24,0.95)), var(--panel-solid);
    border: 1px solid var(--border-strong);
    border-radius: 14px;
    padding: 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    box-shadow: var(--shadow-md);
  }
  @media (max-width: 700px) {
    .wo-timer-card { grid-template-columns: 1fr; }
  }
  .wo-clock {
    font-family: "Cinzel", Georgia, serif;
    font-size: 64px;
    font-weight: 800;
    color: var(--gold-2);
    letter-spacing: 0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    text-align: center;
    text-shadow: 0 0 24px var(--gold-glow);
  }
  .wo-clock.running { color: var(--made); text-shadow: 0 0 24px var(--made-glow); }
  .wo-clock.done { color: var(--missed); text-shadow: 0 0 24px var(--missed-glow); animation: woFlash 0.6s ease-in-out 3; }
  @keyframes woFlash { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .wo-clock-sub { text-align: center; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
  .wo-clock-col { display: flex; flex-direction: column; }
  .wo-ctrl-col { display: flex; flex-direction: column; gap: 10px; }
  .wo-ctrl-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .wo-ctrl-row label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
  .wo-secs-input {
    background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: var(--ink);
    padding: 8px 10px; border-radius: 8px; font-size: 16px; width: 80px;
    font-variant-numeric: tabular-nums; text-align: center;
  }
  .wo-preset {
    background: transparent; border: 1px solid var(--border); color: var(--ink-2);
    padding: 6px 10px; border-radius: 7px; font-size: 11px; letter-spacing: 0.1em;
  }
  .wo-preset:hover { border-color: var(--gold); color: var(--gold-2); }
  .wo-big-btn {
    background: var(--gold); color: #1a1208; border: none;
    padding: 12px 22px; border-radius: 10px;
    font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 800;
    box-shadow: 0 0 18px var(--gold-glow);
  }
  .wo-big-btn:hover { background: var(--gold-2); }
  .wo-big-btn.pause { background: var(--gold-2); }
  .wo-big-btn.ghost {
    background: transparent; color: var(--ink); border: 1px solid var(--border-strong); box-shadow: none;
  }
  .wo-big-btn.ghost:hover { background: var(--panel-2); }

  .wo-table-wrap { overflow-x: auto; }
  .wo-table {
    width: 100%; min-width: 700px;
    border-collapse: separate; border-spacing: 0;
    background: var(--panel-solid); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden;
  }
  .wo-table th, .wo-table td {
    padding: 0; border-bottom: 1px solid var(--border);
  }
  .wo-table tr:last-child td { border-bottom: none; }
  .wo-table th {
    background: rgba(0,0,0,0.3);
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 700;
    padding: 10px 12px;
    text-align: left;
  }
  .wo-table th.wo-ex-th { padding: 6px; }
  .wo-ex-input {
    width: 100%;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    color: var(--gold-2);
    padding: 8px 10px;
    border-radius: 7px;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    text-align: center;
  }
  .wo-ex-input:focus { outline: none; border-color: var(--gold); }
  .wo-ex-input::placeholder { color: var(--muted-2); font-weight: 500; }
  .wo-name-cell {
    padding: 12px 14px;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
    white-space: nowrap;
    background: rgba(0,0,0,0.15);
    min-width: 160px;
  }
  .wo-jersey {
    display: inline-block;
    width: 24px; text-align: center;
    color: var(--gold-2);
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    margin-right: 6px;
    opacity: 0.7;
  }
  .wo-cell {
    position: relative;
    padding: 0;
    text-align: center;
    min-width: 90px;
  }
  .wo-cell-btn {
    width: 100%;
    height: 56px;
    background: transparent;
    border: none;
    color: var(--ink);
    font-size: 24px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    transition: background 0.15s;
  }
  .wo-cell-btn:hover { background: rgba(212,175,55,0.08); }
  .wo-cell-btn:active { background: var(--gold-glow); }
  .wo-cell-btn.has-val { color: var(--gold-2); }
  .wo-cell-btn.zero { color: var(--muted-2); font-weight: 400; }
  .wo-cell-minus {
    position: absolute;
    top: 4px; right: 4px;
    background: transparent;
    border: none;
    color: var(--muted-2);
    font-size: 14px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .wo-cell:hover .wo-cell-minus { opacity: 1; }
  .wo-cell-minus:hover { color: var(--missed); background: rgba(239,68,68,0.1); }
  .wo-flash {
    animation: woTap 0.35s ease-out;
  }
  @keyframes woTap {
    0% { background: var(--gold-glow); }
    100% { background: transparent; }
  }
  .wo-empty {
    text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px;
    letter-spacing: 0.14em; text-transform: uppercase;
  }

  /* ---------- Lineup tool ---------- */
  .lu-hint { font-size: 12px; color: var(--muted); letter-spacing: 0.06em; margin: 4px 0 14px; }
  .lu-bench-card { padding: 14px 14px 10px; margin-bottom: 16px; }
  .lu-bench-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .lu-bench-head h3 { margin: 0; }
  .lu-bench-head .lu-count { font-size: 11px; color: var(--muted); letter-spacing: 0.16em; }
  .lu-bench { display: flex; flex-wrap: wrap; gap: 8px; min-height: 56px; }

  .lu-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 12px 8px 8px;
    background: var(--bg-2); border: 1px solid var(--border-strong); border-radius: 999px;
    color: var(--text); font-size: 14px; font-weight: 600;
    cursor: grab; user-select: none; transition: transform .12s, border-color .12s, background .12s, opacity .12s;
    touch-action: manipulation;
  }
  .lu-chip:hover { border-color: var(--gold); transform: translateY(-1px); }
  .lu-chip.dragging { opacity: 0.4; cursor: grabbing; }
  .lu-chip.armed { border-color: var(--gold); background: rgba(212,175,55,0.16); box-shadow: 0 0 0 2px var(--gold-glow); }
  .lu-chip .lu-num {
    width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), #b8902e); color: #1a1208;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 12px; letter-spacing: 0;
  }
  .lu-chip .lu-num.no-num { background: var(--bg); color: var(--muted); border: 1px dashed var(--border-strong); }
  .lu-chip .lu-name { white-space: nowrap; }
  .lu-chip .lu-pos {
    font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
    padding: 2px 6px; border-radius: 6px;
    background: rgba(212,175,55,0.18); color: var(--gold-2);
    border: 1px solid rgba(212,175,55,0.35);
  }
  .lu-chip .lu-ovr {
    font-size: 11px; font-weight: 800; font-variant-numeric: tabular-nums;
    padding: 2px 7px; border-radius: 6px; line-height: 1;
    background: rgba(212,175,55,0.16); color: var(--gold-2);
    border: 1px solid rgba(212,175,55,0.35);
  }
  .lu-chip .lu-ovr.low  { background: rgba(240,87,79,0.16);  color: #f0746c; border-color: rgba(240,87,79,0.4); }
  .lu-chip .lu-ovr.high { background: rgba(63,185,132,0.16); color: #6bd49a; border-color: rgba(63,185,132,0.45); }
  .lu-chip .lu-ovr.none { background: transparent; color: var(--muted-2); border-color: var(--border); font-weight: 600; }
  .lu-chip .lu-badge {
    font-size: 10px; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 999px;
    background: rgba(255,255,255,0.05); color: var(--muted); font-weight: 700;
  }
  .lu-chip.use-1 .lu-badge { background: rgba(212,175,55,0.14); color: var(--gold-2); }
  .lu-chip.use-2 .lu-badge { background: rgba(212,175,55,0.24); color: var(--gold-2); }
  .lu-chip.use-3 .lu-badge { background: rgba(212,175,55,0.38); color: #fff1c2; }
  .lu-chip.use-4 .lu-badge { background: linear-gradient(135deg, var(--gold), #b8902e); color: #1a1208; box-shadow: 0 0 6px var(--gold-glow); }

  .lu-quarters {
    display: grid; gap: 14px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  @media (max-width: 720px) {
    .lu-quarters { grid-template-columns: 1fr; }
  }

  .lu-q {
    background: var(--panel-solid, var(--bg-2));
    border: 1px solid var(--border); border-radius: 14px; padding: 14px;
    transition: border-color .15s, background .15s;
  }
  .lu-q.drag-over { border-color: var(--gold); background: rgba(212,175,55,0.06); }
  .lu-q.full { border-color: rgba(63,185,132,0.45); }
  .lu-q-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .lu-q-title { font-size: 16px; font-weight: 800; letter-spacing: 0.14em; color: var(--gold-2); }
  .lu-q-count { font-size: 11px; letter-spacing: 0.16em; color: var(--muted); font-weight: 700; }
  .lu-q-count.full { color: #3fb984; }
  .lu-slots { display: grid; gap: 6px; }
  .lu-slot-row {
    display: grid; grid-template-columns: 44px 1fr; gap: 8px; align-items: stretch;
  }
  .lu-slot-label {
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; letter-spacing: 0.12em;
    color: var(--gold-2);
    background: rgba(212,175,55,0.08);
    border: 1px solid rgba(212,175,55,0.22);
    border-radius: 10px;
  }
  .lu-slot {
    min-height: 44px;
    display: flex; align-items: center;
    padding: 4px 6px;
    border: 1px dashed var(--border); border-radius: 10px;
    background: rgba(0,0,0,0.18);
    transition: border-color .12s, background .12s;
  }
  .lu-slot.empty { color: var(--muted-2); font-size: 11px; letter-spacing: 0.18em; justify-content: center; }
  .lu-slot.drag-over { border-color: var(--gold); border-style: solid; background: rgba(212,175,55,0.10); }
  .lu-slot.armed-target { border-color: var(--gold-2); border-style: solid; }
  .lu-slot .lu-chip { flex: 1; cursor: default; }
  .lu-slot .lu-chip:hover { transform: none; }

  /* ½-pair slot: two stacked half-chips sharing one position */
  .lu-slot.pair {
    flex-direction: column; gap: 4px; padding: 4px;
    border-style: solid; border-color: rgba(212,175,55,0.35);
    background: rgba(212,175,55,0.04);
  }
  .lu-slot.pair .lu-chip { width: 100%; flex: none; padding: 5px 10px 5px 5px; gap: 6px; font-size: 13px; border-radius: 999px; }
  .lu-slot.pair .lu-chip .lu-num { width: 22px; height: 22px; font-size: 11px; }
  .lu-chip .lu-half-tag {
    font-size: 10px; font-weight: 800; letter-spacing: 0.04em;
    padding: 2px 6px; border-radius: 6px; line-height: 1;
    background: linear-gradient(135deg, var(--gold), #b8902e); color: #1a1208;
    border: 1px solid rgba(212,175,55,0.5);
  }
  .lu-chip .lu-x {
    margin-left: auto; padding: 2px 8px; border-radius: 999px;
    background: rgba(255,255,255,0.06); color: var(--muted); cursor: pointer;
    font-size: 14px; line-height: 1; border: none;

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.4';

const SUPABASE_URL = 'https://vlcpgwxeybpzwidjackz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gtHRqI4H2q9VwyE7sG0BKA_qJSXkJMU';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

/* ============ UUID polyfill (some preview iframes block crypto.randomUUID) ============ */
function uuid() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    try { return uuid(); } catch(e) {}
  }
  // RFC4122-ish v4 fallback using Math.random — fine for our use (unique per device, no collisions in practice)
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

/* ============ STATE ============ */
const state = {
  view: 'home',
  loading: true,
  error: null,
  games: [],
  players: [],
  currentGameId: null,
  currentQuarter: 1,
  events: [],   // for current game
  stints: [],   // for current game
  undoStack: [],
  selectedPlayerId: null,
  summaryShotFilter: null, // player_id or null = show all
};

/* ============ COURT GEOMETRY ============ */
// SVG viewBox 0 0 500 470 (1 unit = 0.1 ft, court 50ft × 47ft half)
// NBA-style 3pt: 23'9" top arc + straight corner segments 3ft from sideline
const HOOP = { x: 250, y: 53 };
const ARC_R = 237.5;          // 23.75 ft top-of-key arc
const CORNER_X_L = 30;        // left corner 3pt line (3 ft from sideline)
const CORNER_X_R = 470;       // right corner 3pt line
const CORNER_END_Y = 142;     // where straight corner line meets the arc
const PAINT = { x1: 190, x2: 310, y1: 5, y2: 195 };

function shotPoints(x, y) {
  // Corner zone: 3pt only if past the straight line
  if (y <= CORNER_END_Y) {
    if (x <= CORNER_X_L || x >= CORNER_X_R) return 3;
    return 2;
  }
  // Above corner zone: 3pt only if past the arc
  const dx = x - HOOP.x, dy = y - HOOP.y;
  return Math.hypot(dx, dy) > ARC_R ? 3 : 2;
}

function shotZone(x, y) {
  if (x >= PAINT.x1 && x <= PAINT.x2 && y >= PAINT.y1 && y <= PAINT.y2) return 'paint';
  if (y <= CORNER_END_Y && (x <= CORNER_X_L || x >= CORNER_X_R)) return 'corner3';
  const dx = x - HOOP.x, dy = y - HOOP.y;
  const dist = Math.hypot(dx, dy);
  if (dist > ARC_R) {
    if (Math.abs(dx) > 130) return 'wing3';
    return 'top3';
  }
  return 'mid';
}

/* ============ DATA OPS ============ */
async function loadInitial() {
  state.loading = true; render();
  // Always populate from local cache first so the app is usable instantly,
  // even when offline. Then top up from Supabase if reachable.
  loadCache();
  if (!effectivelyOnline()) {
    state.error = null;
    state.loading = false; render();
    return;
  }
  try {
    const [pl, gm] = await Promise.all([
      sb.from('players').select('*').order('name'),
      sb.from('games').select('*').order('game_date', { ascending: false }),
    ]);
    if (pl.error) throw pl.error;
    if (gm.error) throw gm.error;
    // Merge: server is authoritative, but rows still pending in outbox stay
    // visible until they've been pushed.
    state.players = mergeRowsKeepingPending('players', pl.data || [], state.players);
    state.games = mergeRowsKeepingPending('games', gm.data || [], state.games);
    mergePositionsIntoPlayers();
    mergeRatingsFromPlayers();
    migrateLocalPositionsToSupabase();
    migrateLocalRatingsToSupabase();
    syncSavedLineupsWithSupabase();
    state.error = null;
    saveCache();
  } catch (e) {
    console.error(e);
    state.error = `Database connection issue: ${e.message}. Showing cached data.`;
  }
  state.loading = false; render();
}

async function loadGameDetail(gameId) {
  state.loading = true; render();
  // Restore from cache first — works offline and gives instant load.
  const cached = loadGameDataCache(gameId);
  state.events = cached.events;
  state.stints = cached.stints;
  state.undoStack = [];
  if (!effectivelyOnline()) {
    state.loading = false; render();
    return;
  }
  try {
    const [ev, st] = await Promise.all([
      sb.from('events').select('*').eq('game_id', gameId).order('created_at'),
      sb.from('stints').select('*').eq('game_id', gameId).order('created_at'),
    ]);
    if (ev.error) throw ev.error;
    if (st.error) throw st.error;
    // Merge: server is source of truth, but local rows not yet on server stay.
    state.events = mergeRowsByPendingId('events', ev.data || []);
    state.stints = mergeRowsByPendingId('stints', st.data || []);
    persistCurrentGameData();
  } catch (e) {
    console.error(e);

}

/* Merge server rows with rows still pending in the outbox for the same table:
   pending rows that haven't reached the server yet must not be wiped from
   local state during a refresh. */
function mergeRowsByPendingId(table, serverRows) {
  return mergeRowsKeepingPending(table, serverRows,
    table === 'events' ? state.events : state.stints);
}
function mergeRowsKeepingPending(table, serverRows, localRows) {
  const pendingIds = new Set(
    sync.outbox.filter(e => e.table === table && e.op === 'upsert').map(e => e.rowId)
  );
  const pendingDeletes = new Set(
    sync.outbox.filter(e => e.table === table && e.op === 'delete').map(e => e.rowId)
  );
  const serverIds = new Set(serverRows.map(r => r.id));
  // Server rows except those locally pending deletion
  const fromServer = serverRows.filter(r => !pendingDeletes.has(r.id));
  // Local rows still pending upsert and not yet on server
  const localOnly = (localRows || []).filter(r => pendingIds.has(r.id) && !serverIds.has(r.id));
  return [...fromServer, ...localOnly];
}

/* ============ OFFLINE / OUTBOX SYNC ============
   Every write that should reach Supabase goes through the outbox. Local state
   is updated immediately (writes never block on the network). The outbox is
   persisted in localStorage so app reloads / crashes / wifi drops don't lose
   pending ops. An explicit OFFLINE toggle plus navigator.onLine determine
   whether we attempt to flush right now. Ops use 'upsert' (insert→upsert,
   update→upsert with id) so retrying is idempotent and ordering only matters
   between insert/update vs delete of the same row — coalescing handles that.
*/
const OUTBOX_LS_KEY = 'hoops-outbox-v1';
const OFFLINE_TOGGLE_LS_KEY = 'hoops-offline-toggle';
const SYNC_RECENT_ERROR_MAX_AGE_MS = 60_000;

const sync = {
  outbox: [],
  offlineToggle: lsGet(OFFLINE_TOGGLE_LS_KEY) === '1',
  navOnline: (typeof navigator !== 'undefined' && 'onLine' in navigator) ? navigator.onLine : true,
  flushing: false,
  flushTimer: null,
  lastErrorAt: 0,
  lastErrorMsg: null,
  listeners: new Set(),
};

function loadOutbox() {
  try { sync.outbox = JSON.parse(lsGet(OUTBOX_LS_KEY) || '[]') || []; }
  catch(e) { sync.outbox = []; }
}
function persistOutbox() { lsSet(OUTBOX_LS_KEY, JSON.stringify(sync.outbox)); }

function effectivelyOnline() { return sync.navOnline && !sync.offlineToggle; }
function pendingCount() { return sync.outbox.length; }
function setOfflineToggle(on) {
  sync.offlineToggle = !!on;
  lsSet(OFFLINE_TOGGLE_LS_KEY, on ? '1' : '0');
  notifySync();
  if (!on) scheduleFlush();
}
function notifySync() {
  for (const fn of sync.listeners) { try { fn(); } catch(e) {} }
}
function onSyncChange(fn) { sync.listeners.add(fn); return () => sync.listeners.delete(fn); }

function enqueueOp(entry) {
  // Coalesce: an upsert for a row with a pending upsert → merge payloads.
  // A delete for a row with pending upserts → drop the upserts + queue delete.
  if (entry.op === 'upsert') {
    const existing = sync.outbox.find(e => e.table === entry.table && e.rowId === entry.rowId && e.op === 'upsert');
    if (existing) {
      existing.payload = { ...existing.payload, ...entry.payload };
      existing.ts = Date.now();
      persistOutbox(); notifySync(); scheduleFlush(); return;
    }
  } else if (entry.op === 'delete') {
    sync.outbox = sync.outbox.filter(e => !(e.table === entry.table && e.rowId === entry.rowId));
  }
  sync.outbox.push({ id: uuid(), ts: Date.now(), attempts: 0, lastError: null, ...entry });
  persistOutbox(); notifySync(); scheduleFlush();
}

const oxb = {
  /* INSERT or full row UPSERT. payload must include id. */
  upsert(table, row) {
    if (!row || !row.id) { console.warn('oxb.upsert needs row.id', table, row); return; }
    enqueueOp({ table, op: 'upsert', rowId: row.id, payload: row });
  },
  /* Partial UPDATE on a row. updates is the diff (without id). */
  update(table, rowId, updates) {
    if (!rowId) { console.warn('oxb.update needs rowId', table); return; }
    enqueueOp({ table, op: 'upsert', rowId, payload: { id: rowId, ...updates } });
  },
  /* DELETE by id. */
  delete(table, rowId) {
    if (!rowId) { console.warn('oxb.delete needs rowId', table); return; }
    enqueueOp({ table, op: 'delete', rowId });
  },
};

function scheduleFlush() {
  if (sync.flushTimer) return;
  sync.flushTimer = setTimeout(() => { sync.flushTimer = null; flushOutbox(); }, 150);
}

async function flushOutbox(opts) {
  opts = opts || {};
  if (sync.flushing) return { ok: false, reason: 'busy' };
  if (!effectivelyOnline()) return { ok: false, reason: 'offline' };
  if (!sync.outbox.length) return { ok: true, drained: 0 };
  sync.flushing = true; notifySync();
  let drained = 0;
  try {
    while (sync.outbox.length) {
      const e = sync.outbox[0];
      try {
        if (e.op === 'upsert') {
          const { error } = await sb.from(e.table).upsert(e.payload, { onConflict: 'id' });
          if (error) throw error;
        } else if (e.op === 'delete') {
          const { error } = await sb.from(e.table).delete().eq('id', e.rowId);
          if (error) throw error;
        }
        sync.outbox.shift();
        drained++;
        persistOutbox(); notifySync();
      } catch (err) {
        e.attempts = (e.attempts || 0) + 1;
        e.lastError = (err && err.message) || String(err);
        sync.lastErrorAt = Date.now();
        sync.lastErrorMsg = e.lastError;
        persistOutbox(); notifySync();
        // Stop on first error to preserve order; user can retry.
        return { ok: false, reason: 'error', error: e.lastError, drained };
      }
    }
    return { ok: true, drained };
  } finally {
    sync.flushing = false; notifySync();
  }
}

if (typeof window !== 'undefined') {
  window.addEventListener('online', () => { sync.navOnline = true; notifySync(); scheduleFlush(); });
  window.addEventListener('offline', () => { sync.navOnline = false; notifySync(); });
  // Periodic retry every 30s while items are queued
  setInterval(() => { if (sync.outbox.length && effectivelyOnline()) flushOutbox(); }, 30_000);
}
loadOutbox();
// Try to flush anything pending from a previous session, once Supabase is loaded

/* Player ability ratings 1-10 across 5 attributes. localStorage only for now;
   if needed later we can sync to a separate Supabase table. */
const RATINGS_LS_KEY = 'hoops-ratings-v1';
const RATING_ATTRS = [
  { key: 'def', label: 'Defense',    short: 'D'  },
  { key: 'sh',  label: 'Shooting',   short: 'Sh' },
  { key: 'dr',  label: 'Driving',    short: 'Dr' },
  { key: 'db',  label: 'Dribbling',  short: 'Db' },
  { key: 'pm',  label: 'Playmaking', short: 'Pm' },
  { key: 'rb',  label: 'Rebounding', short: 'Re' },
  { key: 'sp',  label: 'Speed',      short: 'Sp' },
];
const RATINGS_PIN = '4545';
let ratingsUnlocked = false; // session-only; resets on reload

const LINEUP_HIDE_RATINGS_KEY = 'hoops-lineup-hide-ratings';
function isLineupRatingsHidden() { return lsGet(LINEUP_HIDE_RATINGS_KEY) === '1'; }
function setLineupRatingsHidden(v) { lsSet(LINEUP_HIDE_RATINGS_KEY, v ? '1' : '0'); }
function loadRatings() {
  try { return JSON.parse(lsGet(RATINGS_LS_KEY) || '{}') || {}; } catch(e) { return {}; }
}
function saveRatings(m) { lsSet(RATINGS_LS_KEY, JSON.stringify(m)); }
function getPlayerRatings(playerId) { return loadRatings()[playerId] || {}; }
function setPlayerRating(playerId, attrKey, value) {
  const m = loadRatings();
  if (!m[playerId]) m[playerId] = {};
  if (value == null || value === '') {
    delete m[playerId][attrKey];
  } else {
    const n = Math.max(1, Math.min(10, parseInt(value)));
    if (!Number.isNaN(n)) m[playerId][attrKey] = n;
  }
  if (Object.keys(m[playerId]).length === 0) delete m[playerId];
  saveRatings(m);
  syncPlayerRatingsToSupabase(playerId);
}
function syncPlayerRatingsToSupabase(playerId) {
  const m = loadRatings();
  const r = m[playerId];
  const payload = r && Object.keys(r).length ? r : null;
  oxb.update('players', playerId, { ratings: payload });
}
/* Called after loadInitial pulls players from Supabase. Overrides localStorage
   with anything coming from Supabase so cross-device sync works. */
function mergeRatingsFromPlayers() {
  const m = loadRatings();
  let changed = false;
  for (const p of state.players) {
    if (p.ratings && typeof p.ratings === 'object' && Object.keys(p.ratings).length) {
      m[p.id] = { ...p.ratings };
      changed = true;
    }
  }
  if (changed) saveRatings(m);
}
/* One-time push: if a player has localStorage ratings but Supabase is empty,
   migrate up. After this runs once, Supabase becomes source of truth. */
function migrateLocalRatingsToSupabase() {
  const m = loadRatings();
  for (const p of state.players) {
    const supaEmpty = !p.ratings || Object.keys(p.ratings).length === 0;
    const localHas = m[p.id] && Object.keys(m[p.id]).length;
    if (supaEmpty && localHas) {
      oxb.update('players', p.id, { ratings: m[p.id] });
    }
  }
}
function playerOverallRating(playerId) {
  const r = getPlayerRatings(playerId);
  const vals = RATING_ATTRS.map(a => r[a.key]).filter(v => v != null);
  if (!vals.length) return null;
  return vals.reduce((s, v) => s + v, 0) / vals.length;
}

/* Aggregate stats for an array of playerIds. Skips unrated values per
   attribute, returns counts so the UI can warn about missing data. */
function aggregateRatings(playerIds) {
  return aggregateRatingsWeighted(playerIds.map(id => ({ id, weight: 1 })));
}
/* Aggregate ratings across [{ id, weight }] entries. ½-pair members pass
   weight 0.5 so a paired slot's contribution to the lineup average equals
   one slot (avg of the two players), not two. */
function aggregateRatingsWeighted(entries) {
  const map = loadRatings();
  const perAttr = {};
  let overallSum = 0, overallCount = 0;
  for (const a of RATING_ATTRS) {
    let sumW = 0, totalW = 0, countRated = 0;
    for (const e of entries) {
      const v = map[e.id] && map[e.id][a.key];
      if (v != null) { sumW += v * e.weight; totalW += e.weight; countRated++; }
    }
    const avg = totalW > 0 ? sumW / totalW : null;
    perAttr[a.key] = { avg, count: countRated, missing: entries.length - countRated };
    if (avg != null) { overallSum += avg; overallCount++; }
  }
  const overall = overallCount ? overallSum / overallCount : null;
  const fullyUnrated = entries.filter(e => {
    const r = map[e.id] || {};
    return !RATING_ATTRS.some(a => r[a.key] != null);
  }).length;
  return { perAttr, overall, totalPlayers: entries.length, fullyUnrated };
}

async function createGame({ game_date, opponent, location, quarter_length_seconds }) {

async function deleteGame(id) {

async function logEvent(eventData) {
  const id = uuid();
  const row = {
    id,
    game_id: state.currentGameId,
    quarter: state.currentQuarter,
    created_at: new Date().toISOString(),
    points: 0,
    on_floor_player_ids: getOnFloorIds(state.currentQuarter),
    seconds_remaining: getCurrentClockSeconds(),
    ...eventData,
  };
  state.events.push(row);
  state.undoStack.push({ type: 'event', id });
  oxb.upsert('events', row);
  persistCurrentGameData();

}

async function deleteEvent(eventId) {
  state.events = state.events.filter(e => e.id !== eventId);
  oxb.delete('events', eventId);
  persistCurrentGameData();
}

async function adjustStat(playerId, eventType, delta) {
  if (delta > 0) {
    await logEvent({ team: 'us', player_id: playerId, event_type: eventType });
    flashCard(playerId, 'good');
  } else {
    // Find the most recent matching event in this quarter and delete it
    const match = [...state.events].reverse().find(
      e => e.player_id === playerId && e.event_type === eventType
        && e.quarter === state.currentQuarter && e.team === 'us'
    );
    if (match) {
      await deleteEvent(match.id);
      // pop from undo stack if it was the most recent
      const top = state.undoStack[state.undoStack.length - 1];
      if (top && top.type === 'event' && top.id === match.id) state.undoStack.pop();
      render();
    } else {
      toast('Nothing to undo');
    }
  }
}

async function adjustOpponentStat(eventType, delta) {
  if (delta > 0) {
    await logEvent({ team: 'them', player_id: null, event_type: eventType });
  } else {
    const match = [...state.events].reverse().find(
      e => e.team === 'them' && e.event_type === eventType
        && e.quarter === state.currentQuarter && e.player_id === null
    );
    if (match) {
      await deleteEvent(match.id);
      render();
    }
  }
}

async function startStint(playerId, secsRemaining, quarter = state.currentQuarter) {
  // Guard: don't open a second stint if this player already has an open one in this quarter
  const existing = state.stints.find(s =>
    s.player_id === playerId && s.quarter === quarter && s.ended_seconds_remaining === null
  );
  if (existing) { render(); return; }
  const id = uuid();
  const row = {
    id, game_id: state.currentGameId, quarter,
    player_id: playerId,
    started_seconds_remaining: secsRemaining,
    ended_seconds_remaining: null,
    created_at: new Date().toISOString(),
  };
  state.stints.push(row);
  state.undoStack.push({ type: 'stint-start', id });
  oxb.upsert('stints', row);
  persistCurrentGameData();
  render();
}

// Remove player from floor without subbing in a replacement
async function removeFromFloor(playerId) {
  const q = state.currentQuarter;
  const t = getCurrentClockSeconds();
  const open = state.stints.filter(s =>
    s.player_id === playerId && s.quarter === q && s.ended_seconds_remaining === null
  );
  if (!open.length) return;
  for (const stint of open) {
    await endStint(stint.id, t);
  }
}

async function endStint(stintId, secsRemaining) {
  const stint = state.stints.find(s => s.id === stintId);
  if (!stint) return;
  stint.ended_seconds_remaining = secsRemaining;
  state.undoStack.push({ type: 'stint-end', id: stintId });
  oxb.update('stints', stintId, { ended_seconds_remaining: secsRemaining });
  persistCurrentGameData();
  render();
}

async function undoLastAction() {
  const action = state.undoStack.pop();
  if (!action) { toast('Nothing to undo'); return; }
  if (action.type === 'event') {
    await deleteEvent(action.id);
  } else if (action.type === 'stint-start') {
    state.stints = state.stints.filter(s => s.id !== action.id);
    oxb.delete('stints', action.id);
  } else if (action.type === 'stint-end') {
    const stint = state.stints.find(s => s.id === action.id);
    if (stint) {
      stint.ended_seconds_remaining = null;
      oxb.update('stints', action.id, { ended_seconds_remaining: null });
    }
  }
  persistCurrentGameData();
  toast('Undone');
  render();
}

async function addPlayer(name, jersey_number) {

/* ============ COMPUTATIONS ============ */
function getCurrentGame() {
  return state.games.find(g => g.id === state.currentGameId);
}

// Manually-tracked clock for the active quarter (in seconds remaining)
function getQuarterLengthSec() {
  const g = getCurrentGame();
  return g?.quarter_length_seconds || 480;
}

function getCurrentClockSeconds() {
  const key = `clock-${state.currentGameId}-${state.currentQuarter}`;
  const v = lsGet(key);
  if (v != null) return parseInt(v);
  return getQuarterLengthSec();
}
function setCurrentClockSeconds(secs) {
  const key = `clock-${state.currentGameId}-${state.currentQuarter}`;
  lsSet(key, String(Math.max(0, Math.min(getQuarterLengthSec(), secs))));
}

// Returns array of player_ids currently on floor for given quarter (deduped)
function getOnFloorIds(quarter) {
  const seen = new Set();
  const out = [];
  for (const s of state.stints) {
    if (s.quarter !== quarter || s.ended_seconds_remaining !== null) continue;
    if (seen.has(s.player_id)) continue;
    seen.add(s.player_id);
    out.push(s.player_id);
  }
  return out;
}

function pointsForEvent(e) {
  switch (e.event_type) {
    case 'shot_made_2': return 2;
    case 'shot_made_3': return 3;
    case 'ft_made': return 1;
    default: return 0;
  }
}

function getQuarterScore(quarter, team) {
  return state.events
    .filter(e => e.quarter === quarter && e.team === team)
    .reduce((sum, e) => sum + pointsForEvent(e), 0);
}

function getGameScore(team) {
  return [1,2,3,4].reduce((s, q) => s + getQuarterScore(q, team), 0);
}

function getPlayerStats(playerId, quarter) {
  const evts = state.events.filter(e =>
    e.player_id === playerId && (quarter == null || e.quarter === quarter) && e.team === 'us'
  );
  const c = (t) => evts.filter(e => e.event_type === t).length;
  const m2 = c('shot_made_2'), x2 = c('shot_missed_2');
  const m3 = c('shot_made_3'), x3 = c('shot_missed_3');
  const fm = c('ft_made'), fx = c('ft_missed');
  const fga = m2 + x2 + m3 + x3;
  const fgm = m2 + m3;
  const pts = m2*2 + m3*3 + fm;
  return {
    pts,
    fgm, fga,
    fgPct: fga ? Math.round(fgm / fga * 100) : null,
    p2m: m2, p2a: m2+x2,
    p3m: m3, p3a: m3+x3,
    p3Pct: (m3+x3) ? Math.round(m3 / (m3+x3) * 100) : null,
    ftm: fm, fta: fm+fx,
    ftPct: (fm+fx) ? Math.round(fm/(fm+fx)*100) : null,
    ast: c('assist'),
    oreb: c('oreb'),
    dreb: c('dreb'),
    reb: c('oreb') + c('dreb'),
    stl: c('steal'),
    blk: c('block'),
    to: c('turnover'),
    pf: c('foul'),
  };
}

function getPlusMinus(playerId) {
  let pm = 0;
  for (const e of state.events) {
    const points = pointsForEvent(e);
    if (!points) continue;
    const onFloor = (e.on_floor_player_ids || []).includes(playerId);
    if (!onFloor) continue;
    pm += (e.team === 'us' ? points : -points);
  }
  return pm;
}

// Total seconds played in this game for a player
function getMinutesPlayed(playerId) {
  let totalSec = 0;
  const qLen = getQuarterLengthSec();
  for (const s of state.stints) {
    if (s.player_id !== playerId) continue;
    const start = s.started_seconds_remaining;
    const end = s.ended_seconds_remaining ?? (s.quarter === state.currentQuarter ? getCurrentClockSeconds() : 0);
    totalSec += Math.max(0, start - end);
  }
  return totalSec;
}

function fmtClock(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

/* ============ RENDER ============ */
function $(sel) { return document.querySelector(sel); }
function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (v == null || v === false) continue;
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    if (Array.isArray(c)) c.forEach(cc => e.append(cc?.nodeType ? cc : document.createTextNode(String(cc))));
    else e.append(c.nodeType ? c : document.createTextNode(String(c)));
  }
  return e;
}

function render() {
  const root = $('#view-root');
  root.innerHTML = '';
  if (state.loading) { root.append(el('div', { class: 'loader' }, 'Loading…')); return; }
  if (state.error) root.append(el('div', { class: 'err-banner' }, state.error));
  if (state.view === 'home') renderHome(root);
  else if (state.view === 'game') renderGame(root);
  else if (state.view === 'player') renderPlayerDetail(root);
  else if (state.view === 'roster') renderRoster(root);
  else if (state.view === 'workout') renderWorkout(root);
  else if (state.view === 'lineup') renderLineup(root);
  else if (state.view === 'ratings') renderRatings(root);
}

/* ----- COURT ----- */
function buildCourtSvg() {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 500 470');
  svg.setAttribute('class', 'court-svg');

  // Court bg gradient pattern (wood subtle)
  // (background applied via CSS gradient on <rect>; using svg rect for crispness)
  const bg = document.createElementNS(ns, 'rect');
  bg.setAttribute('width', '500'); bg.setAttribute('height', '470');
  bg.setAttribute('fill', 'transparent');
  svg.appendChild(bg);

  // Court lines: stroke = court-line color
  const line = (d, w = 2.5) => {
    const p = document.createElementNS(ns, 'path');
    p.setAttribute('d', d);
    p.setAttribute('stroke', 'rgba(15,12,6,0.78)');
    p.setAttribute('stroke-width', String(w));
    p.setAttribute('fill', 'none');
    return p;
  };
  // Sideline / baseline
  svg.appendChild(line('M 5 5 L 495 5 L 495 465 L 5 465 Z', 3));
  // 3pt line: NBA-style — straight corners (3ft from sideline) + 23'9" top arc
  svg.appendChild(line('M 30 5 L 30 142 A 237.5 237.5 0 0 0 470 142 L 470 5'));
  // Paint (key) — 12ft wide × 19ft from baseline to FT line
  svg.appendChild(line('M 190 5 L 190 195 L 310 195 L 310 5'));
  // FT circle top half (solid, basket side)
  svg.appendChild(line('M 190 195 A 60 60 0 0 1 310 195'));
  // FT circle bottom half (dashed, midcourt side)
  const ftBack = line('M 190 195 A 60 60 0 0 0 310 195');
  ftBack.setAttribute('stroke-dasharray', '6 6');
  svg.appendChild(ftBack);
  // Restricted area (4ft semicircle around hoop)
  svg.appendChild(line('M 210 53 A 40 40 0 0 0 290 53'));
  // Backboard (4ft from baseline)
  svg.appendChild(line('M 220 45 L 280 45', 4));
  // Hoop (4'9" from baseline)
  const hoop = document.createElementNS(ns, 'circle');
  hoop.setAttribute('cx', '250'); hoop.setAttribute('cy', '53');
  hoop.setAttribute('r', '9'); hoop.setAttribute('fill', 'none');
  hoop.setAttribute('stroke', '#d83a2c'); hoop.setAttribute('stroke-width', '2.5');
  svg.appendChild(hoop);
  // Half-court center circle (top half)
  svg.appendChild(line('M 190 465 A 60 60 0 0 1 310 465'));

  // Plot all shots for this quarter
  for (const e of state.events) {
    if (e.quarter !== state.currentQuarter) continue;
    if (e.court_x == null || e.court_y == null) continue;
    if (!['shot_made_2','shot_missed_2','shot_made_3','shot_missed_3'].includes(e.event_type)) continue;
    const made = e.event_type.includes('made');
    const teamCls = e.team === 'them' ? 'them' : 'us';
    const shape = document.createElementNS(ns, 'circle');
    shape.setAttribute('cx', String(e.court_x));
    shape.setAttribute('cy', String(e.court_y));
    shape.setAttribute('r', '8');
    shape.setAttribute('class', `shot-dot ${teamCls} ${made ? 'made' : 'missed'}`);
    shape.setAttribute('data-event-id', e.id);
    shape.style.cursor = 'pointer';
    shape.addEventListener('click', (ev) => {
      ev.stopPropagation();
      openShotEditModal(e);
    });
    svg.appendChild(shape);
  }

  // Tap handler
  svg.addEventListener('click', (ev) => {
    const pt = svgPoint(svg, ev);
    openShotModal(pt.x, pt.y);
  });

  return svg;
}

function svgPoint(svg, ev) {
  const rect = svg.getBoundingClientRect();
  const x = (ev.clientX - rect.left) / rect.width * 500;
  const y = (ev.clientY - rect.top) / rect.height * 470;
  return { x: Math.round(x), y: Math.round(y) };
}

/* ----- SHOT MODAL ----- */
function openShotModal(x, y) {
  const onFloorIds = getOnFloorIds(state.currentQuarter);
  // Default to opponent if no Warriors are on floor (so opponent shots can always be logged)
  const ctx = { team: onFloorIds.length ? 'us' : 'them', playerId: null, x, y };
  let pts = shotPoints(x, y);
  let isFT = false;

  function update() {
    const root = $('#modal-root');
    root.innerHTML = '';
    const teamSeg = el('div', { class: 'team-toggle' },
      el('button', { class: ctx.team === 'us' ? 'active' : '', onclick: () => { ctx.team = 'us'; ctx.playerId = null; update(); } }, 'Warriors'),
      el('button', { class: ctx.team === 'them' ? 'active' : '', onclick: () => { ctx.team = 'them'; ctx.playerId = null; update(); } }, getCurrentGame().opponent || 'Other Team'),
    );

    const playerGrid = ctx.team === 'us'
      ? (onFloorIds.length
        ? el('div', { class: 'player-pick-grid' },
            ...onFloorIds.map(pid => {
              const p = state.players.find(x => x.id === pid);
              return el('div', {
                class: `player-pick ${ctx.playerId === pid ? 'active' : ''}`,
                onclick: () => { ctx.playerId = pid; update(); },
              },
                el('div', { class: 'pp-num' }, p.jersey_number || p.name[0]),
                el('div', { class: 'pp-name' }, shortName(p.name)),
              );
            })
          )
        : el('div', { style: 'text-align:center; color:var(--muted); font-size:12px; letter-spacing:0.14em; text-transform:uppercase; padding:14px;' }, 'No Warriors on floor — set lineup first'))
      : null;

    const valueDisplay = el('div', { style: 'text-align:center; margin: 6px 0 12px; color: var(--gold-2); font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; font-size: 13px;' },
      isFT ? 'Free Throw (1pt)' : `${pts}-Point Shot`,
    );

    const made = el('button', {
      class: 'btn btn-made btn-big',
      onclick: () => doShot(true),
    }, 'Made ✓');
    const miss = el('button', {
      class: 'btn btn-missed btn-big',
      onclick: () => doShot(false),
    }, 'Missed ✕');

    function doShot(success) {
      if (ctx.team === 'us' && !ctx.playerId) return toast('Pick a player');
      const evType = isFT
        ? (success ? 'ft_made' : 'ft_missed')
        : (pts === 3 ? (success ? 'shot_made_3' : 'shot_missed_3') : (success ? 'shot_made_2' : 'shot_missed_2'));
      logEvent({
        team: ctx.team,
        player_id: ctx.team === 'us' ? ctx.playerId : null,
        event_type: evType,
        court_x: isFT ? 250 : ctx.x,
        court_y: isFT ? 190 : ctx.y,
        points: success ? (isFT ? 1 : pts) : 0,
      });
      closeModal();
      if (ctx.team === 'us' && ctx.playerId) flashCard(ctx.playerId, success ? 'good' : 'miss');
    }

    const overrides = el('div', { class: 'override-row' },
      el('button', { class: 'btn btn-ghost', onclick: () => { isFT = false; pts = 2; update(); } }, '2pt'),
      el('button', { class: 'btn btn-ghost', onclick: () => { isFT = false; pts = 3; update(); } }, '3pt'),
      el('button', { class: 'btn btn-ghost', onclick: () => { isFT = true; update(); } }, 'Free Throw'),
    );

    const modal = el('div', { class: 'modal-bg', onclick: (e) => { if (e.target === e.currentTarget) closeModal(); } },
      el('div', { class: 'modal' },
        el('h3', {}, ctx.team === 'us' ? 'Shot — Pick Player' : 'Opponent Shot'),
        teamSeg,
        playerGrid,
        valueDisplay,
        el('div', { class: 'made-missed-row' }, made, miss),
        el('div', { style: 'text-align:center; margin-top: 10px; font-size: 11px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase;' }, 'Override'),
        overrides,
        el('div', { style: 'margin-top: 12px; text-align: center;' },
          el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
        ),
      )
    );
    root.append(modal);
  }
  update();
}

/* ----- SUB MODALS ----- */
function openClockEditor() {
  const cur = getCurrentClockSeconds();
  const m = Math.floor(cur/60), s = cur%60;
  openModal(
    el('div', { class: 'modal' },
      el('h3', {}, 'Set Time Remaining'),
      el('div', { class: 'field' },
        el('label', {}, 'Minutes'),

      ),
      el('div', { class: 'field' },
        el('label', {}, 'Seconds'),
        el('input', { type: 'number', id: 'ck-s', value: String(s), min: '0', max: '59' }),
      ),
      el('div', { class: 'modal-actions' },
        el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
        el('button', { class: 'btn btn-primary', onclick: () => {
          const mm = parseInt($('#ck-m').value) || 0;
          const ss = parseInt($('#ck-s').value) || 0;
          setCurrentClockSeconds(mm*60 + ss);
          closeModal(); render();
        }}, 'Set'),
