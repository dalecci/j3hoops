function openAddStarterModal() {
  const onFloorIds = getOnFloorIds(state.currentQuarter);
  const available = state.players.filter(p => p.active && !onFloorIds.includes(p.id));
  if (!available.length) return toast('No bench players');
  const slotsLeft = 5 - onFloorIds.length;
  const selected = new Set();

  function update() {
    const root = $('#modal-root');
    root.innerHTML = '';
    const grid = el('div', { class: 'player-pick-grid' },
      ...available.map(p => el('div', {
        class: `player-pick ${selected.has(p.id) ? 'active' : ''}`,
        onclick: () => {
          if (selected.has(p.id)) {
            selected.delete(p.id);
          } else {
            if (selected.size >= slotsLeft) return toast(`Max ${slotsLeft}`);
            selected.add(p.id);
          }
          update();
        },
      },
        el('div', { class: 'pp-num' }, p.jersey_number || p.name[0]),
        el('div', { class: 'pp-name' }, shortName(p.name)),
      ))
    );

    const counter = el('div', {
      style: 'text-align:center; margin-bottom:12px; font-size:13px; letter-spacing:0.16em; text-transform:uppercase; font-weight:700;'
        + (selected.size === slotsLeft ? ' color:var(--made);' : ' color:var(--gold-2);'),
    }, `${selected.size} / ${slotsLeft} selected`);

    const modal = el('div', { class: 'modal-bg', onclick: (e) => { if (e.target === e.currentTarget) closeModal(); } },
      el('div', { class: 'modal modal-lg' },
        el('h3', {}, slotsLeft === 5 ? `Pick 5 Starters — Q${state.currentQuarter}` : `Add Up To ${slotsLeft} — Q${state.currentQuarter}`),
        counter,
        grid,
        el('div', { class: 'modal-actions' },
          el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
          el('button', {
            class: 'btn btn-primary',
            disabled: selected.size === 0 ? '' : null,
            style: selected.size === 0 ? 'opacity:0.4; pointer-events:none;' : '',
            onclick: async () => {
              if (!selected.size) return;
              const startSec = onFloorIds.length === 0 ? getQuarterLengthSec() : getCurrentClockSeconds();
              for (const pid of selected) {
                await startStint(pid, startSec);
              }
              closeModal();
            },
          }, `Load ${selected.size}`),
        ),
      )
    );
    root.append(modal);
  }
  update();
}

function openSubInModal(playerId) {
  // Player tapped from bench — sub them in. Need to pick someone to sub OUT (or fill empty slot).
  const onFloorIds = getOnFloorIds(state.currentQuarter);
  if (onFloorIds.length < 5) {
    // Just add them
    const startSec = onFloorIds.length === 0 ? getQuarterLengthSec() : getCurrentClockSeconds();
    return startStint(playerId, startSec);
  }
  // Otherwise need to swap
  openModal(
    el('div', { class: 'modal' },
      el('h3', {}, 'Sub In — Replace Whom?'),
      el('div', { class: 'player-pick-grid' },
        ...onFloorIds.map(pid => {
          const p = state.players.find(x => x.id === pid);
          return el('div', { class: 'player-pick', onclick: () => promptSwap(pid, playerId) },
            el('div', { class: 'pp-num' }, p.jersey_number || p.name[0]),
            el('div', { class: 'pp-name' }, shortName(p.name)),
          );
        })
      ),
      el('div', { class: 'modal-actions' },
        el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
      ),
    )
  );
}

function openSubOutModal(playerId) {
  // Player on floor tapped sub button — pick replacement from bench
  const onFloorIds = getOnFloorIds(state.currentQuarter);
  const bench = state.players.filter(p => p.active && !onFloorIds.includes(p.id));
  if (!bench.length) return toast('No bench players available');
  openModal(
    el('div', { class: 'modal' },
      el('h3', {}, 'Sub In For…'),
      el('div', { class: 'player-pick-grid' },
        ...bench.map(p => el('div', { class: 'player-pick', onclick: () => promptSwap(playerId, p.id) },
          el('div', { class: 'pp-num' }, p.jersey_number || p.name[0]),
          el('div', { class: 'pp-name' }, shortName(p.name)),
        ))
      ),
      el('div', { class: 'modal-actions' },
        el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
      ),
    )
  );
}

function promptSwap(outId, inId) {
  const cur = getCurrentClockSeconds();
  const m = Math.floor(cur/60), s = cur%60;
  const outP = state.players.find(p => p.id === outId);
  const inP = state.players.find(p => p.id === inId);
  openModal(
    el('div', { class: 'modal' },
      el('h3', {}, 'Time of Substitution'),
      el('p', { style: 'color: var(--ink-2); font-size: 13px; margin-bottom: 14px;' },
        `${shortName(outP.name)} OUT, ${shortName(inP.name)} IN`),
      el('div', { class: 'field' },
        el('label', {}, 'Minutes Remaining'),
        el('input', { type: 'number', id: 'sw-m', value: String(m), min: '0', max: '20' }),
      ),
      el('div', { class: 'field' },
        el('label', {}, 'Seconds Remaining'),
        el('input', { type: 'number', id: 'sw-s', value: String(s), min: '0', max: '59' }),
      ),
      el('div', { class: 'modal-actions' },
        el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Cancel'),
        el('button', { class: 'btn btn-primary', onclick: async () => {
          const mm = parseInt($('#sw-m').value) || 0;
          const ss = parseInt($('#sw-s').value) || 0;
          const t = mm*60 + ss;
          // End out player's open stint
          const outStint = state.stints.find(s => s.player_id === outId && s.quarter === state.currentQuarter && s.ended_seconds_remaining === null);
          if (outStint) await endStint(outStint.id, t);
          // Start in player's stint
          await startStint(inId, t);
          // Update displayed clock
          setCurrentClockSeconds(t);
          closeModal();
        }}, 'Sub'),
      ),
    )
  );
}

/* ----- SUMMARY ----- */
function renderSummary() {
  const wrap = el('div');
  // Totals across game per player
  const playersWithStats = state.players
    .map(p => ({ p, stats: getPlayerStats(p.id, null), pm: getPlusMinus(p.id), mins: getMinutesPlayed(p.id) }))
    .filter(x => {
      // Only show players with any event or stint in this game
      const hasEvt = state.events.some(e => e.player_id === x.p.id);
      const hasStint = state.stints.some(s => s.player_id === x.p.id);
      return hasEvt || hasStint;
    })
    .sort((a, b) => b.stats.pts - a.stats.pts);

  const table = el('table', { class: 'summary-table' });
  table.innerHTML = `
    <thead><tr>
      <th>Player</th><th>MIN</th><th>PTS</th><th>FG</th><th>3PT</th><th>FT</th>
      <th>AST</th><th>OREB</th><th>DREB</th><th>STL</th><th>BLK</th><th>TO</th><th>PF</th><th>+/−</th>
    </tr></thead>
  `;
  const tbody = el('tbody');
  for (const { p, stats: s, pm, mins } of playersWithStats) {
    const pmCls = pm > 0 ? 'pm-pos' : pm < 0 ? 'pm-neg' : '';
    const isActive = state.summaryShotFilter === p.id;
    const nameCell = el('td', { class: `name-cell name-cell-row ${isActive ? 'active-filter' : ''}` },
      el('span', {
        class: 'sum-name', title: 'Filter shot chart',
        onclick: () => {
          state.summaryShotFilter = isActive ? null : p.id;
          render();
        },
      }, shortName(p.name)),
      el('button', {
        class: 'sum-name-detail', title: 'Open player detail',
        onclick: (ev) => { ev.stopPropagation(); openPlayerDetail(p.id); },
      }, '↗'),
    );
    tbody.append(el('tr', {},
      nameCell,
      el('td', {}, fmtClock(mins)),
      el('td', { style: 'font-weight:700;color:var(--gold-2)' }, String(s.pts)),
      el('td', {}, `${s.fgm}/${s.fga}`),
      el('td', {}, `${s.p3m}/${s.p3a}`),
      el('td', {}, `${s.ftm}/${s.fta}`),
      el('td', {}, String(s.ast)),
      el('td', {}, String(s.oreb)),
      el('td', {}, String(s.dreb)),
      el('td', {}, String(s.stl)),
      el('td', {}, String(s.blk)),
      el('td', {}, String(s.to)),
      el('td', {}, String(s.pf)),
      el('td', { class: pmCls }, (pm > 0 ? '+' : '') + pm),
    ));
  }
  table.append(tbody);
  wrap.append(el('div', { class: 'card' },
    el('h3', {}, 'Box Score'),
    table,
  ));

  // Quarter breakdown
  const qbWrap = el('div', { class: 'card', style: 'margin-top: 16px;' });
  qbWrap.append(el('h3', {}, 'Quarter Scores'));
  const qbTable = el('table', { class: 'summary-table' });
  qbTable.innerHTML = `<thead><tr><th>Team</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>Total</th></tr></thead>`;
  const qbBody = el('tbody');
  qbBody.append(el('tr', {},
    el('td', { class: 'name-cell' }, 'Warriors'),
    ...[1,2,3,4].map(q => el('td', {}, String(getQuarterScore(q, 'us')))),
    el('td', { style: 'font-weight:700;color:var(--gold-2)' }, String(getGameScore('us'))),
  ));
  qbBody.append(el('tr', {},
    el('td', { class: 'name-cell' }, getCurrentGame().opponent || 'Opponent'),
    ...[1,2,3,4].map(q => el('td', {}, String(getQuarterScore(q, 'them')))),
    el('td', { style: 'font-weight:700' }, String(getGameScore('them'))),
  ));
  qbTable.append(qbBody);
  qbWrap.append(qbTable);
  wrap.append(qbWrap);

  // Full-game shot chart (all 4 quarters)
  const allShots = state.events.filter(e =>
    ['shot_made_2','shot_missed_2','shot_made_3','shot_missed_3'].includes(e.event_type)
    && e.court_x != null && e.court_y != null
  );
  if (allShots.length) {
    const filterPid = state.summaryShotFilter;
    const filterPlayer = filterPid ? state.players.find(p => p.id === filterPid) : null;
    // When filtering by a player, only show THAT player's shots (so misses + makes only)
    const shotEvents = filterPid
      ? allShots.filter(e => e.player_id === filterPid)
      : allShots;
    const usM = shotEvents.filter(e => e.team !== 'them' && e.event_type.includes('made')).length;
    const usA = shotEvents.filter(e => e.team !== 'them').length;
    const themM = shotEvents.filter(e => e.team === 'them' && e.event_type.includes('made')).length;
    const themA = shotEvents.filter(e => e.team === 'them').length;
    const oppName = getCurrentGame()?.opponent || 'Opponent';
    const chartWrap = el('div', { class: 'card', style: 'margin-top: 16px;' });
    chartWrap.append(el('div', { style: 'display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap' },
      el('h3', { style: 'margin:0' }, filterPlayer
        ? `Shot Chart — ${shortName(filterPlayer.name)}`
        : 'Shot Chart — Full Game'),
      filterPlayer
        ? el('button', { class: 'nav-btn', onclick: () => { state.summaryShotFilter = null; render(); } }, `✕ Clear filter`)
        : el('span', { style: 'font-size:11px;color:var(--muted);letter-spacing:0.08em' }, 'Tap a player name to filter'),
    ));
    if (filterPlayer) {
      chartWrap.append(el('div', { class: 'shot-legend' },
        el('span', {}, el('span', { class: 'lg-dot lg-us-made' }), `Made (${usM}/${usA})`),
        el('span', {}, el('span', { class: 'lg-dot lg-us-miss' }), `Miss`),
      ));
    } else {
      chartWrap.append(el('div', { class: 'shot-legend' },
        el('span', {}, el('span', { class: 'lg-dot lg-us-made' }), `Warriors made (${usM}/${usA})`),
        el('span', {}, el('span', { class: 'lg-dot lg-us-miss' }), `Warriors miss`),
        el('span', {}, el('span', { class: 'lg-dot lg-them-made' }), `${oppName} made (${themM}/${themA})`),
        el('span', {}, el('span', { class: 'lg-dot lg-them-miss' }), `${oppName} miss`),
      ));
    }
    if (shotEvents.length) {
      chartWrap.append(buildSummaryCourtSvg(shotEvents));
    } else {
      chartWrap.append(el('div', { style: 'text-align:center;color:var(--muted);font-size:12px;padding:24px;letter-spacing:0.12em;text-transform:uppercase' },
        `No shots logged for ${shortName(filterPlayer.name)}`));
    }
    wrap.append(chartWrap);
  }

  // Team shooting zones
  const zoneWrap = el('div', { class: 'card', style: 'margin-top: 16px;' });
  zoneWrap.append(el('h3', {}, 'Shot Zones — Warriors'));
  zoneWrap.append(buildZoneTable(state.events.filter(e => e.team === 'us')));
  wrap.append(zoneWrap);

  return wrap;
}

// Court SVG showing all shots across all quarters. Tap a dot to delete the shot.
function buildSummaryCourtSvg(shotEvents) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 500 470');
  svg.setAttribute('class', 'court-svg summary-court');

  const bg = document.createElementNS(ns, 'rect');
  bg.setAttribute('width', '500'); bg.setAttribute('height', '470');
  bg.setAttribute('fill', 'transparent');
  svg.appendChild(bg);

  const line = (d, w = 2.5) => {
    const p = document.createElementNS(ns, 'path');
    p.setAttribute('d', d);
    p.setAttribute('stroke', 'rgba(15,12,6,0.78)');
    p.setAttribute('stroke-width', String(w));
    p.setAttribute('fill', 'none');
    return p;
  };
  svg.appendChild(line('M 5 5 L 495 5 L 495 465 L 5 465 Z', 3));
  svg.appendChild(line('M 30 5 L 30 142 A 237.5 237.5 0 0 0 470 142 L 470 5'));
  svg.appendChild(line('M 190 5 L 190 195 L 310 195 L 310 5'));
  svg.appendChild(line('M 190 195 A 60 60 0 0 1 310 195'));
  const ftBack = line('M 190 195 A 60 60 0 0 0 310 195');
  ftBack.setAttribute('stroke-dasharray', '6 6');
  svg.appendChild(ftBack);
  svg.appendChild(line('M 210 53 A 40 40 0 0 0 290 53'));
  svg.appendChild(line('M 220 45 L 280 45', 4));
  const hoop = document.createElementNS(ns, 'circle');
  hoop.setAttribute('cx', '250'); hoop.setAttribute('cy', '53');
  hoop.setAttribute('r', '9'); hoop.setAttribute('fill', 'none');
  hoop.setAttribute('stroke', '#d83a2c'); hoop.setAttribute('stroke-width', '2.5');
  svg.appendChild(hoop);
  svg.appendChild(line('M 190 465 A 60 60 0 0 1 310 465'));

  for (const e of shotEvents) {
    const made = e.event_type.includes('made');
    const teamCls = e.team === 'them' ? 'them' : 'us';
    const shape = document.createElementNS(ns, 'circle');
    shape.setAttribute('cx', String(e.court_x));
    shape.setAttribute('cy', String(e.court_y));
    shape.setAttribute('r', '8');
    shape.setAttribute('class', `shot-dot ${teamCls} ${made ? 'made' : 'missed'}`);
    shape.setAttribute('data-event-id', e.id);
    shape.style.cursor = 'pointer';
    // Tap a shot to delete (with confirmation)
    shape.addEventListener('click', () => openShotEditModal(e));
    svg.appendChild(shape);
  }

  return svg;
}

function buildZoneTable(evts) {
  const zones = ['paint','mid','corner3','wing3','top3'];
  const labels = { paint:'Paint', mid:'Mid-Range', corner3:'Corner 3', wing3:'Wing 3', top3:'Top of Key 3' };
  const rows = zones.map(z => {
    const m = evts.filter(e => e.event_type.includes('made') && !e.event_type.includes('ft') && shotZone(e.court_x, e.court_y) === z).length;
    const x = evts.filter(e => e.event_type.includes('missed') && !e.event_type.includes('ft') && shotZone(e.court_x, e.court_y) === z).length;
    return { z, m, x, a: m+x, pct: m+x ? Math.round(m/(m+x)*100) : null };
  });
  const t = el('table', { class: 'zone-table' });
  t.innerHTML = '<thead><tr><th>Zone</th><th>Made</th><th>Att</th><th>%</th></tr></thead>';
  const tb = el('tbody');
  for (const r of rows) {
    tb.append(el('tr', {},
      el('td', {}, labels[r.z]),
      el('td', {}, String(r.m)),
      el('td', {}, String(r.a)),
      el('td', {}, r.pct == null ? '—' : `${r.pct}%`),
    ));
  }
  t.append(tb);
  return t;
}

function statBlock(num, lbl) {

}

function buildPlayerShotChart(playerId) {

  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 500 470');

    const p = document.createElementNS(ns, 'path');
    p.setAttribute('d', d);
    p.setAttribute('stroke', 'rgba(15,12,6,0.78)');
    p.setAttribute('stroke-width', String(w));
    p.setAttribute('fill', 'none');
    if (dash) p.setAttribute('stroke-dasharray', dash);
    return p;
  };
  svg.appendChild(line('M 5 5 L 495 5 L 495 465 L 5 465 Z', 3));
  svg.appendChild(line('M 30 5 L 30 142 A 237.5 237.5 0 0 0 470 142 L 470 5'));
  svg.appendChild(line('M 190 5 L 190 195 L 310 195 L 310 5'));
  svg.appendChild(line('M 190 195 A 60 60 0 0 1 310 195'));
  svg.appendChild(line('M 190 195 A 60 60 0 0 0 310 195', 2.5, '6 6'));
  svg.appendChild(line('M 210 53 A 40 40 0 0 0 290 53'));
  svg.appendChild(line('M 220 45 L 280 45', 4));
  const hoop = document.createElementNS(ns, 'circle');

/* ============ LINEUP TOOL ============ */
const LU_LS_KEY = 'hoops-lineup-v1';
const LU_QUARTERS = ['Q1','Q2','Q3','Q4'];
const LU_SLOTS = ['PG','SG','SF','PF','C'];
const LU_MAX_PER_Q = LU_SLOTS.length;
let luArmedId = null; // tap-to-place selection

function luDefaultQuarter() {
  return { PG: null, SG: null, SF: null, PF: null, C: null };
}
function luDefault() {
  const out = {};
  for (const q of LU_QUARTERS) out[q] = luDefaultQuarter();
  return out;
}
/* Slot value shape:
   - null            → empty
   - "<player-id>"   → solo (1.0 weight)
   - { a, b }        → ½-pair: two players share the slot, each 0.5 weight */
function luIsPair(v) { return v && typeof v === 'object' && (v.a || v.b); }
function luSlotIds(v) {
  if (!v) return [];
  if (typeof v === 'string') return [v];
  return [v.a, v.b].filter(Boolean);
}
function luSlotEntries(v) {
  if (!v) return [];
  if (typeof v === 'string') return [{ id: v, weight: 1, role: 'solo' }];
  const out = [];
  if (v.a) out.push({ id: v.a, weight: 0.5, role: 'a' });
  if (v.b) out.push({ id: v.b, weight: 0.5, role: 'b' });
  return out;
}
function luLoad() {
  try {
    const raw = lsGet(LU_LS_KEY);
    if (raw) {
      const v = JSON.parse(raw) || {};
      const out = {};
      for (const q of LU_QUARTERS) {
        const cur = v[q];
        const slotObj = luDefaultQuarter();
        if (Array.isArray(cur)) {
          for (let i = 0; i < cur.length && i < LU_SLOTS.length; i++) {
            if (cur[i]) slotObj[LU_SLOTS[i]] = cur[i];
          }
        } else if (cur && typeof cur === 'object') {
          for (const s of LU_SLOTS) {
            const val = cur[s];
            if (!val) continue;
            if (typeof val === 'string') {
              slotObj[s] = val;
            } else if (typeof val === 'object' && (val.a || val.b)) {
              // Normalize: collapse to solo if only one half exists
              if (val.a && val.b) slotObj[s] = { a: val.a, b: val.b };
              else slotObj[s] = val.a || val.b;
            }
          }
        }
        out[q] = slotObj;
      }
      return out;
    }
  } catch(e) {}
  return luDefault();
}
function luSave(lu) { lsSet(LU_LS_KEY, JSON.stringify(lu)); }
function luPlayerById(id) { return state.players.find(p => p.id === id); }
/* Flat array of all player IDs in a quarter (pair = 2 ids) */
function luQuarterIds(lu, q) {
  const out = [];
  for (const s of LU_SLOTS) out.push(...luSlotIds(lu[q][s]));
  return out;
}
/* Weighted entries for a quarter: pairs contribute 0.5 each, solos 1.0 */
function luQuarterEntries(lu, q) {
  const out = [];
  for (const s of LU_SLOTS) out.push(...luSlotEntries(lu[q][s]));
  return out;
}
/* Slot count filled (each pair counts as 1 slot, max 5) */
function luQuarterFilledCount(lu, q) {
  return LU_SLOTS.reduce((n, s) => n + (lu[q][s] ? 1 : 0), 0);
}
/* Fractional usage: 1 per solo appearance, 0.5 per pair appearance */
function luUsage(lu, playerId) {
  let total = 0;
  for (const q of LU_QUARTERS) {
    for (const s of LU_SLOTS) {
      const v = lu[q][s];
      if (!v) continue;
      if (typeof v === 'string') {
        if (v === playerId) total += 1;
      } else {
        if (v.a === playerId) total += 0.5;
        if (v.b === playerId) total += 0.5;
      }
    }
  }
  return total;
}
/* Find any slot the player is in for this quarter. Returns { slot, role }
   where role is 'solo' | 'a' | 'b', or null if not present. */
function luFindSlotInQuarter(lu, q, playerId) {
  for (const s of LU_SLOTS) {
    const v = lu[q][s];
    if (!v) continue;
    if (typeof v === 'string') {
      if (v === playerId) return { slot: s, role: 'solo' };
    } else {
      if (v.a === playerId) return { slot: s, role: 'a' };
      if (v.b === playerId) return { slot: s, role: 'b' };
    }
  }
  return null;
}

/* Place a player in a specific (q, slot) as a SOLO (replaces whatever was
   there — pair or solo). Moves the player within the same quarter if they
   were already in another slot. */
function luPlaceInSlot(lu, q, slot, playerId) {
  const existing = luFindSlotInQuarter(lu, q, playerId);
  if (existing && existing.slot === slot && existing.role === 'solo') return { ok: true };
  if (existing) {
    // Remove player from their current slot/role
    const cur = lu[q][existing.slot];
    if (typeof cur === 'string') {
      lu[q][existing.slot] = null;
    } else {
      // Pair: drop the player's half; collapse remaining half to solo
      const otherId = existing.role === 'a' ? cur.b : cur.a;
      lu[q][existing.slot] = otherId || null;
    }
  }
  lu[q][slot] = playerId;
  return { ok: true, moved: !!existing };
}
/* Add a player as ½-pair partner to an existing solo slot. Fails if slot
   isn't a solo, partner is already there, or partner is the same player. */
function luAddPartner(lu, q, slot, partnerId) {
  const cur = lu[q][slot];
  if (!cur) return { ok: false, msg: 'Slot is empty — pick a primary first' };
  if (typeof cur !== 'string') return { ok: false, msg: 'Slot already has a pair' };
  if (cur === partnerId) return { ok: false, msg: 'Same player as primary' };
  // If partner is elsewhere in this quarter, remove them from there first
  const elsewhere = luFindSlotInQuarter(lu, q, partnerId);
  if (elsewhere) {
    const ev = lu[q][elsewhere.slot];
    if (typeof ev === 'string') lu[q][elsewhere.slot] = null;
    else {
      const otherId = elsewhere.role === 'a' ? ev.b : ev.a;
      lu[q][elsewhere.slot] = otherId || null;
    }
  }
  lu[q][slot] = { a: cur, b: partnerId };
  return { ok: true };
}
/* Remove one half of a pair, collapsing to solo. Pass which='a' or 'b'. */
function luRemoveHalf(lu, q, slot, which) {
  const cur = lu[q][slot];
  if (!cur || typeof cur === 'string') return { ok: false };
  const remaining = which === 'a' ? cur.b : cur.a;
  lu[q][slot] = remaining || null;
  return { ok: true };
}
function luClearSlot(lu, q, slot) { lu[q][slot] = null; }

function renderLineup(root) {
  const lu = luLoad();

  const wrap = el('div');
  wrap.append(el('div', { class: 'game-header' },
    el('button', { class: 'iconbtn', onclick: () => { state.view = 'home'; render(); } }, '←'),
    el('h2', { style: 'margin:0' }, 'Lineup Tool'),
  ));

  if (!state.players.length) {
    wrap.append(el('div', { class: 'wo-empty' }, 'No players yet — add some on the Roster page'));
    root.append(wrap);
    return;
  }

  wrap.append(el('div', { class: 'lu-hint' },
    `Tap any position slot to pick a player. Badge on the chip shows how many quarters that player is in.`
  ));

  const hideRatings = isLineupRatingsHidden();

  wrap.append(el('div', { class: 'lu-actions' },
    el('button', { class: 'nav-btn', onclick: openSaveLineupModal }, 'Save'),
    el('button', { class: 'nav-btn', onclick: openLoadLineupModal }, 'Load'),
    el('button', { class: 'nav-btn', onclick: openPushLineupModal }, '→ Push to Game'),
    el('button', { class: 'nav-btn', onclick: printLineup }, '📄 PDF'),
    el('button', { class: 'nav-btn', onclick: () => {
      setLineupRatingsHidden(!hideRatings);
      render();
    }}, hideRatings ? '👁 Show ratings' : '🙈 Hide ratings'),
    el('button', { class: 'nav-btn', onclick: () => {
      if (!confirm('Clear all quarters?')) return;
      luSave(luDefault());
      render();
    }}, 'Reset'),
  ));

  // ----- Per-quarter overall chart -----
  if (!hideRatings) {
    const anyFilled = LU_QUARTERS.some(q => luQuarterFilledCount(lu, q) > 0);
    if (anyFilled) {
      const totalCard = el('div', { class: 'lu-total-card' });
      const totalFilled = LU_QUARTERS.reduce((n, q) => n + luQuarterFilledCount(lu, q), 0);
      totalCard.append(el('div', { style: 'display:flex;align-items:baseline;justify-content:space-between' },
        el('div', { style: 'font-size:12px;letter-spacing:0.18em;color:var(--muted);font-weight:700;text-transform:uppercase' }, 'Quarter overall scores'),
        el('div', { style: 'font-size:11px;color:var(--muted)' },
          `${totalFilled} of ${LU_QUARTERS.length * LU_MAX_PER_Q} slots filled`),
      ));
      const grid = el('div', { class: 'lu-q-overall-grid' });
      for (const q of LU_QUARTERS) {
        const entries = luQuarterEntries(lu, q);
        const filledSlots = luQuarterFilledCount(lu, q);
        const agg = entries.length ? aggregateRatingsWeighted(entries) : { overall: null };
        const ovrText = agg.overall == null ? '—' : (Math.round(agg.overall * 10) / 10).toFixed(1);
        const cls = statClass(agg.overall);
        grid.append(el('div', { class: `lu-q-overall ${cls}` },
          el('div', { class: 'lu-qo-label' }, q),
          el('div', { class: 'lu-qo-val' }, ovrText),
          el('div', { class: 'lu-qo-sub' }, `${filledSlots}/${LU_MAX_PER_Q}`),
        ));
      }
      totalCard.append(grid);
      wrap.append(totalCard);
    }
  }

  // ----- Quarters with 5 position slots each -----
  const grid = el('div', { class: 'lu-quarters' });
  for (const q of LU_QUARTERS) {
    const filled = luQuarterFilledCount(lu, q);
    const isFull = filled >= LU_MAX_PER_Q;
    const qCard = el('div', { class: `lu-q${isFull ? ' full' : ''}`, 'data-q': q });

    qCard.append(el('div', { class: 'lu-q-head' },
      el('div', { class: 'lu-q-title' }, q),
      el('div', { class: `lu-q-count${isFull ? ' full' : ''}` }, `${filled} / ${LU_MAX_PER_Q}`),
    ));

    const slotsWrap = el('div', { class: 'lu-slots' });
    for (const slotName of LU_SLOTS) {
      const val = lu[q][slotName];
      const isPair = luIsPair(val);
      const slotEl = el('div', { class: `lu-slot${val ? (isPair ? ' pair' : '') : ' empty'}` });

      if (val) {
        if (isPair) {
          // Drop missing-player halves
          const pa = luPlayerById(val.a);
          const pb = luPlayerById(val.b);
          if (!pa && !pb) {
            luClearSlot(lu, q, slotName); luSave(lu);
            slotEl.classList.add('empty'); slotEl.classList.remove('pair');
            slotEl.append('Empty');
          } else if (!pa || !pb) {
            const surviving = pa || pb;
            lu[q][slotName] = surviving.id; luSave(lu);
            slotEl.classList.remove('pair');
            slotEl.append(buildChip(surviving, luUsage(lu, surviving.id), { source: 'quarter', quarter: q, slot: slotName, role: 'solo' }));
          } else {
            slotEl.append(buildChip(pa, luUsage(lu, pa.id), { source: 'quarter', quarter: q, slot: slotName, role: 'a' }));
            slotEl.append(buildChip(pb, luUsage(lu, pb.id), { source: 'quarter', quarter: q, slot: slotName, role: 'b' }));
          }
        } else {
          const p = luPlayerById(val);
          if (!p) {
            luClearSlot(lu, q, slotName); luSave(lu);
            slotEl.classList.add('empty');
            slotEl.append('Empty');
          } else {
            slotEl.append(buildChip(p, luUsage(lu, p.id), { source: 'quarter', quarter: q, slot: slotName, role: 'solo' }));
          }
        }
      } else {
        slotEl.append('Tap to pick');
      }

      slotEl.addEventListener('click', (e) => {
        if (e.target.closest('.lu-x')) return;
        openPickerModal(q, slotName);
      });

      slotsWrap.append(el('div', { class: 'lu-slot-row' },
        el('div', { class: 'lu-slot-label' }, slotName),
        slotEl,
      ));
    }
    qCard.append(slotsWrap);

    const qEntries = luQuarterEntries(lu, q);
    if (!hideRatings && qEntries.length > 0) {
      qCard.append(buildStatsPanel(aggregateRatingsWeighted(qEntries), `${q} score`));
    }

    grid.append(qCard);
  }
  wrap.append(grid);

  root.append(wrap);
}

function buildChip(p, usage, opts) {
  const hideRating = isLineupRatingsHidden();
  const role = opts.role || 'solo'; // 'solo' | 'a' | 'b'
  const isHalf = role !== 'solo';
  const classes = ['lu-chip'];
  if (isHalf) classes.push('half');
  // Use floor for the heat-tier so 0.5 shows neutral, 1.0+ tiers as before
  const tier = Math.min(Math.floor(usage), 4);
  if (tier >= 1) classes.push(`use-${tier}`);

  const numNode = (p.jersey_number != null && p.jersey_number !== '')
    ? el('span', { class: 'lu-num' }, String(p.jersey_number))
    : el('span', { class: 'lu-num no-num' }, '·');

  const posTag = posLabel(p.position);
  const overall = playerOverallRating(p.id);
  const ovrClass = statClass(overall);
  const ovrText = overall == null ? '—' : (Math.round(overall * 10) / 10).toFixed(1);
  // Fractional usage display: "1.5" but "2" if whole
  const usageText = (usage % 1 === 0) ? String(usage) : usage.toFixed(1);
  const children = [
    numNode,
    el('span', { class: 'lu-name' }, p.name),
    isHalf ? el('span', { class: 'lu-half-tag', title: '½ slot — shares with partner' }, '½') : null,
    posTag ? el('span', { class: 'lu-pos' }, posTag) : null,
    hideRating ? null : el('span', { class: `lu-ovr ${ovrClass}`, title: 'Overall rating' }, ovrText),
    el('span', { class: 'lu-badge', title: 'Quarters used (½ = pair)' }, `${usageText}/${LU_QUARTERS.length}`),
    el('button', { class: 'lu-x', title: isHalf ? 'Remove ½' : 'Remove', onclick: (e) => {
      e.stopPropagation();
      const cur = luLoad();
      if (isHalf) luRemoveHalf(cur, opts.quarter, opts.slot, role);
      else luClearSlot(cur, opts.quarter, opts.slot);
      luSave(cur);
      render();
    }}, '×'),
  ].filter(Boolean);

  return el('div', { class: classes.join(' ') }, ...children);
}

/* ============ RATINGS PAGE ============ */
function fmt1(n) { return n == null ? '—' : (Math.round(n * 10) / 10).toFixed(1); }
function statClass(v) {
  if (v == null) return 'none';
  if (v < 5) return 'low';
  if (v >= 7) return 'high';
  return 'mid';
}

function renderRatingsLock(wrap) {
  const card = el('div', { class: 'card', style: 'max-width:380px;margin:60px auto;padding:28px 24px;text-align:center' },
    el('div', { style: 'font-size:30px;margin-bottom:6px' }, '🔒'),
    el('h3', { style: 'color:var(--gold-2);letter-spacing:0.18em;margin:0 0 6px' }, 'Ratings locked'),
    el('p', { style: 'color:var(--muted);font-size:13px;margin:0 0 18px' }, 'Enter PIN to unlock'),
    el('input', {
      type: 'password', id: 'ratings-pin', inputmode: 'numeric', maxlength: '8',
      autocomplete: 'off', placeholder: '••••',
      style: 'width:100%;padding:14px;border-radius:10px;border:1px solid var(--border-strong);background:rgba(0,0,0,0.3);color:var(--text);font-size:22px;text-align:center;letter-spacing:10px;font-family:inherit',
    }),
    el('div', { id: 'ratings-pin-err', style: 'color:#f0746c;font-size:12px;min-height:18px;margin-top:8px;letter-spacing:0.06em;font-weight:600' }, ''),
    el('button', { class: 'btn btn-primary', style: 'margin-top:10px;width:100%', onclick: tryUnlockRatings }, 'Unlock'),
  );
  wrap.append(card);
  setTimeout(() => {
    const input = $('#ratings-pin');

function tryUnlockRatings() {
  const v = ($('#ratings-pin')?.value || '').trim();
  if (v === RATINGS_PIN) {
    ratingsUnlocked = true;
    render();
  } else {
    const err = $('#ratings-pin-err');

function renderRatings(root) {
  const wrap = el('div');
  wrap.append(el('div', { class: 'game-header' },
    el('button', { class: 'iconbtn', onclick: () => { state.view = 'home'; render(); } }, '←'),
    el('h2', { style: 'margin:0' }, 'Ratings'),
    el('div', { class: 'header-spacer' }),
    ratingsUnlocked ? el('button', { class: 'nav-btn', onclick: () => {
      ratingsUnlocked = false; render();
    }}, '🔒 Lock') : null,
  ));

  if (!ratingsUnlocked) {
    renderRatingsLock(wrap);
    root.append(wrap);
    return;
  }

  if (!state.players.length) {
    wrap.append(el('div', { class: 'wo-empty' }, 'No players yet — add some on the Roster page'));
    root.append(wrap);
    return;
  }

  wrap.append(el('div', { class: 'lu-hint' },
    'Rate each player 1–10 on five abilities. Used to score lineups. Unrated abilities are skipped from averages.'
  ));

  const sorted = [...state.players].filter(p => p.active !== false)
    .sort((a, b) => (a.jersey_number || 999) - (b.jersey_number || 999) || a.name.localeCompare(b.name));

  for (const p of sorted) {
    const card = el('div', { class: 'card rating-card', 'data-pid': p.id });
    const overall = playerOverallRating(p.id);

    const numNode = (p.jersey_number != null && p.jersey_number !== '')
      ? el('span', { class: 'rating-jersey' }, String(p.jersey_number))
      : el('span', { class: 'rating-jersey no-num' }, '·');

    const posTag = posLabel(p.position);
    const overallEl = el('div', { class: `rating-overall${overall == null ? ' none' : ''}` },
      el('span', { class: 'lbl' }, 'Overall'),
      fmt1(overall),
    );

    card.append(el('div', { class: 'rating-head' },
      numNode,
      el('span', { class: 'rating-name' }, p.name),
      posTag ? el('span', { class: 'rating-pos' }, posTag) : null,
      overallEl,
    ));

    for (const attr of RATING_ATTRS) {
      const cur = (getPlayerRatings(p.id))[attr.key];
      const rated = cur != null;
      const row = el('div', { class: `rating-row${rated ? '' : ' unrated'}` });

      const slider = el('input', {
        type: 'range', min: '1', max: '10', step: '1',
        value: rated ? String(cur) : '5',
      });
      const pct = ((parseInt(slider.value) - 1) / 9) * 100;
      slider.style.setProperty('--pct', pct + '%');

      const valEl = el('div', { class: 'rv' }, rated ? String(cur) : '—');

      slider.addEventListener('input', () => {
        const v = parseInt(slider.value);
        valEl.textContent = String(v);
        const p2 = ((v - 1) / 9) * 100;
        slider.style.setProperty('--pct', p2 + '%');
        row.classList.remove('unrated');
      });
      slider.addEventListener('change', () => {
        setPlayerRating(p.id, attr.key, slider.value);
        // Refresh just the Overall on this card
        const newOverall = playerOverallRating(p.id);
        overallEl.classList.toggle('none', newOverall == null);
        overallEl.lastChild.nodeValue = fmt1(newOverall);
      });

      const clearBtn = el('button', { class: 'rclr', title: 'Clear rating', onclick: () => {
        setPlayerRating(p.id, attr.key, null);
        render();
      }}, '×');

      row.append(
        el('div', { class: 'rl' }, attr.label),
        slider,
        valEl,
        clearBtn,
      );
      card.append(row);
    }

    wrap.append(card);
  }

  root.append(wrap);
}

/* ============ SAVED LINEUPS ============ */
const SAVED_LU_LS_KEY = 'hoops-saved-lineups-v1';
function loadSavedLineups() {
  try { return JSON.parse(lsGet(SAVED_LU_LS_KEY) || '[]') || []; } catch(e) { return []; }
}
function saveSavedLineups(arr) { lsSet(SAVED_LU_LS_KEY, JSON.stringify(arr)); }
function addSavedLineup(name) {
  const arr = loadSavedLineups();
  const row = { id: uuid(), name, savedAt: new Date().toISOString(), lu: luLoad() };
  arr.unshift(row);
  saveSavedLineups(arr);
  oxb.upsert('saved_lineups', { id: row.id, name: row.name, saved_at: row.savedAt, lineup: row.lu });
  return row;
}
function updateSavedLineup(id, newName) {
  const arr = loadSavedLineups();
  const idx = arr.findIndex(s => s.id === id);
  if (idx === -1) return false;
  arr[idx].lu = luLoad();
  arr[idx].savedAt = new Date().toISOString();
  if (newName) arr[idx].name = newName;
  const [row] = arr.splice(idx, 1);
  arr.unshift(row);
  saveSavedLineups(arr);
  oxb.update('saved_lineups', id, { name: row.name, saved_at: row.savedAt, lineup: row.lu });
  return true;
}
function findSavedLineupByName(name) {
  const norm = name.trim().toLowerCase();
  return loadSavedLineups().find(s => s.name.trim().toLowerCase() === norm) || null;
}
function deleteSavedLineup(id) {
  saveSavedLineups(loadSavedLineups().filter(s => s.id !== id));
  oxb.delete('saved_lineups', id);
}

/* Convert current Lineup tool into stints for a target game.
   Solo slot → 1 stint covering the whole quarter (started=quarterLen, ended=null).
   Pair slot → 2 stints, each half (A: start→half closed, B: half→null open).
   By default, quarters that ALREADY have stints are skipped to avoid clobbering;
   pass { overwrite: true } to delete existing stints in those quarters first. */
async function pushLineupToGame(gameId, opts = {}) {
  const overwrite = !!opts.overwrite;
  const g = state.games.find(g => g.id === gameId);
  if (!g) return { ok: false, msg: 'Game not found' };
  const lu = luLoad();
  // Load stints for the target game (use cache if it's the current game)
  let existing;
  if (state.currentGameId === gameId) {
    existing = state.stints.slice();
  } else {
    const { data, error } = await sb.from('stints').select('*').eq('game_id', gameId);
    if (error) return { ok: false, msg: error.message };
    existing = data || [];
  }
  const quarterLen = g.quarter_length_seconds || 480;
  const pushed = [], skipped = [];
  const stintsToDelete = [];
  const newStints = [];
  for (const q of [1,2,3,4]) {
    const luQ = lu['Q' + q];
    if (!luQ) continue;
    const hasFilled = LU_SLOTS.some(s => luQ[s]);
    if (!hasFilled) continue;
    const existingForQ = existing.filter(s => s.quarter === q);
    if (existingForQ.length) {
      if (overwrite) {
        for (const s of existingForQ) stintsToDelete.push(s.id);
      } else {
        skipped.push(q); continue;
      }
    }
    for (const slot of LU_SLOTS) {
      const v = luQ[slot];
      if (!v) continue;
      if (typeof v === 'string') {
        newStints.push({
          id: uuid(), game_id: gameId, quarter: q, player_id: v,
          started_seconds_remaining: quarterLen, ended_seconds_remaining: null,
          created_at: new Date().toISOString(),
        });
      } else if (v && v.a && v.b) {
        const half = Math.floor(quarterLen / 2);
        newStints.push({
          id: uuid(), game_id: gameId, quarter: q, player_id: v.a,
          started_seconds_remaining: quarterLen, ended_seconds_remaining: half,
          created_at: new Date().toISOString(),
        });
        newStints.push({
          id: uuid(), game_id: gameId, quarter: q, player_id: v.b,
          started_seconds_remaining: half, ended_seconds_remaining: null,
          created_at: new Date().toISOString(),
        });
      }
    }
    pushed.push(q);
  }
  if (stintsToDelete.length) {
    if (state.currentGameId === gameId) {
      state.stints = state.stints.filter(s => !stintsToDelete.includes(s.id));
    }
    for (const sid of stintsToDelete) oxb.delete('stints', sid);
  }
  if (newStints.length) {
    for (const row of newStints) oxb.upsert('stints', row);
    if (state.currentGameId === gameId) state.stints.push(...newStints);
  }
  if (state.currentGameId === gameId) persistCurrentGameData();
  else persistGameData(gameId);
  return { ok: true, pushed, skipped, inserted: newStints.length };
}

/* Pull lineup data into the CURRENT game's CURRENT quarter only.
   Skips players that already have an open stint in this quarter. */
async function pullLineupForCurrentQuarter() {
  const gameId = state.currentGameId;
  const q = state.currentQuarter;
  const g = getCurrentGame();
  if (!g) return;
  const lu = luLoad();
  const luQ = lu['Q' + q];
  if (!luQ) return toast('Lineup is empty for this quarter');
  const quarterLen = g.quarter_length_seconds || 480;
  const hasOpenStint = (pid) => state.stints.some(s =>
    s.player_id === pid && s.quarter === q && s.ended_seconds_remaining === null
  );
  // Anchor time: where to start a freshly-pulled stint. If the quarter has
  // any activity (closed stints), pick up from the current clock; otherwise
  // start from the top of the quarter.
  const quarterHasActivity = state.stints.some(s => s.quarter === q);
  const startSec = quarterHasActivity ? getCurrentClockSeconds() : quarterLen;
  const newStints = [];
  for (const slot of LU_SLOTS) {
    const v = luQ[slot];
    if (!v) continue;
    if (typeof v === 'string') {
      if (hasOpenStint(v)) continue;
      newStints.push({
        id: uuid(), game_id: gameId, quarter: q, player_id: v,
        started_seconds_remaining: startSec, ended_seconds_remaining: null,
        created_at: new Date().toISOString(),
      });
    } else if (v && v.a && v.b) {
      // For pairs: if we're starting fresh, split the quarter in half (A then B).
      // If we're resuming mid-quarter, just put A on the floor now.
      if (!quarterHasActivity) {
        const half = Math.floor(quarterLen / 2);
        if (!hasOpenStint(v.a)) {
          newStints.push({
            id: uuid(), game_id: gameId, quarter: q, player_id: v.a,
            started_seconds_remaining: quarterLen, ended_seconds_remaining: half,
            created_at: new Date().toISOString(),
          });
        }
        if (!hasOpenStint(v.b)) {
          newStints.push({
            id: uuid(), game_id: gameId, quarter: q, player_id: v.b,
            started_seconds_remaining: half, ended_seconds_remaining: null,
            created_at: new Date().toISOString(),
          });
        }
      } else {
        // Resume: just put one of them on (prefer A if neither is open)
        const target = hasOpenStint(v.a) || hasOpenStint(v.b) ? null : v.a;
        if (target) {
          newStints.push({
            id: uuid(), game_id: gameId, quarter: q, player_id: target,
            started_seconds_remaining: startSec, ended_seconds_remaining: null,
            created_at: new Date().toISOString(),
          });
        }
      }
    }
  }
  if (!newStints.length) return toast('Floor already has the lineup players');
  state.stints.push(...newStints);
  for (const row of newStints) oxb.upsert('stints', row);
  persistCurrentGameData();
  render();
  toast(`Pulled Q${q} from lineup`);
}
/* Pull saved lineups from Supabase. Pushes any local-only entries up first,
   then overwrites localStorage with the merged source-of-truth list. If the
   saved_lineups table doesn't exist yet, falls back to localStorage. */
async function syncSavedLineupsWithSupabase() {
  const local = loadSavedLineups();
  const { data, error } = await sb.from('saved_lineups').select('*').order('saved_at', { ascending: false });
  if (error) return; // table not created yet → keep localStorage as-is
  const remoteIds = new Set((data || []).map(r => r.id));
  // Push local-only entries up so they aren't lost
  for (const s of local) {
    if (!remoteIds.has(s.id)) {
      oxb.upsert('saved_lineups', { id: s.id, name: s.name, saved_at: s.savedAt, lineup: s.lu });
    }
  }
  const remote = (data || []).map(r => ({ id: r.id, name: r.name, savedAt: r.saved_at, lu: r.lineup }));
  const localOnly = local.filter(s => !remoteIds.has(s.id));
  // Local-only entries appear at the top since they're being newly synced
  saveSavedLineups([...localOnly, ...remote]);
}
function applySavedLineup(id) {
  const s = loadSavedLineups().find(s => s.id === id);
  if (!s) return false;
  // Run through luLoad-like normalization to be safe
  const out = luDefault();
  for (const q of LU_QUARTERS) {
    const cur = s.lu && s.lu[q];
    if (cur && typeof cur === 'object') {
      for (const sl of LU_SLOTS) if (cur[sl]) out[q][sl] = cur[sl];
    }
  }
  luSave(out);
  return true;
}

// Lazy-load jsPDF (CDN UMD build)
async function ensureJsPdf() {
  if (window.jspdf && window.jspdf.jsPDF) return window.jspdf.jsPDF;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Could not load jsPDF'));
    document.head.appendChild(s);
  });
  return window.jspdf.jsPDF;
}

function playerLabelFromId(id) {
  const p = state.players.find(p => p.id === id);
  if (!p) return '— Missing —';
  return (p.jersey_number ? `#${p.jersey_number} ` : '') + p.name;
}

async function printLineup() {
  let jsPDF;
  try {
    jsPDF = await ensureJsPdf();
  } catch (e) {
    toast('Could not load PDF library — check connection');
    return;
  }
  const lu = luLoad();
  const doc = new jsPDF({ unit: 'pt', format: 'letter', orientation: 'portrait' });

  // Letter portrait = 612 x 792 pt
  const W = 612, H = 792, M = 40;

  // Title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(24);
  doc.text('LINEUP', W / 2, M + 18, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(110, 110, 110);
  const dateStr = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  doc.text(`Warriors  ·  ${dateStr}`, W / 2, M + 36, { align: 'center' });
  doc.setTextColor(0, 0, 0);

  // 2x2 grid of quarters
  const gridTop = M + 58;
  const gridBottom = H - M;
  const gridW = W - 2 * M;
  const gridH = gridBottom - gridTop;
  const gap = 14;
  const cellW = (gridW - gap) / 2;
  const cellH = (gridH - gap) / 2;

  for (let i = 0; i < LU_QUARTERS.length; i++) {
    const q = LU_QUARTERS[i];
    const col = i % 2;
    const row = Math.floor(i / 2);
    const x = M + col * (cellW + gap);
    const y = gridTop + row * (cellH + gap);

    // Card border
    doc.setDrawColor(120, 120, 120);
    doc.setLineWidth(1);
    doc.roundedRect(x, y, cellW, cellH, 8, 8);

    // Quarter header bar
    doc.setFillColor(28, 28, 28);
    doc.roundedRect(x, y, cellW, 30, 8, 8, 'F');
    // Square off bottom of header
    doc.setFillColor(28, 28, 28);
    doc.rect(x, y + 16, cellW, 14, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(15);
    doc.setTextColor(255, 255, 255);
    doc.text(q, x + 14, y + 20);
    // Filled count
    const filled = LU_SLOTS.filter(s => lu[q]?.[s]).length;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(200, 200, 200);
    doc.text(`${filled} / 5`, x + cellW - 14, y + 20, { align: 'right' });
    doc.setTextColor(0, 0, 0);

    // Slots
    const slotStart = y + 38;
    const slotArea = cellH - 46;
    const lineH = slotArea / LU_SLOTS.length;
    for (let j = 0; j < LU_SLOTS.length; j++) {
      const sl = LU_SLOTS[j];
      const v = lu[q]?.[sl];
      const rowY = slotStart + j * lineH;
      const textY = rowY + lineH / 2 + 3;

      // Position pill
      doc.setFillColor(245, 245, 245);
      doc.setDrawColor(210, 210, 210);
      doc.roundedRect(x + 10, rowY + lineH / 2 - 10, 32, 20, 4, 4, 'FD');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(80, 80, 80);
      doc.text(sl, x + 26, textY - 1, { align: 'center' });

      // Player name(s)
      doc.setTextColor(0, 0, 0);
      doc.setFontSize(11);
      if (!v) {
        doc.setFont('helvetica', 'italic');
        doc.setTextColor(170, 170, 170);
        doc.text('—', x + 52, textY);
      } else if (typeof v === 'string') {
        doc.setFont('helvetica', 'normal');
        doc.text(playerLabelFromId(v), x + 52, textY, { maxWidth: cellW - 66 });
      } else if (v.a && v.b) {
        doc.setFont('helvetica', 'normal');
        const aLbl = playerLabelFromId(v.a) + '  ½';
        const bLbl = playerLabelFromId(v.b) + '  ½';
        doc.text(aLbl, x + 52, textY - 6, { maxWidth: cellW - 66 });
        doc.setTextColor(110, 110, 110);
        doc.text(bLbl, x + 52, textY + 7, { maxWidth: cellW - 66 });
      }

      // Row separator
      if (j < LU_SLOTS.length - 1) {
        doc.setDrawColor(230, 230, 230);
        doc.setLineWidth(0.5);
        doc.line(x + 10, rowY + lineH, x + cellW - 10, rowY + lineH);
      }
    }
  }

  // Footer
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(150, 150, 150);
  doc.text('Generated by Playmaker · hoops.j3taviation.com', W / 2, H - 18, { align: 'center' });

  const fname = `lineup_${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(fname);
}

/* ============ PLAYER PICKER (slot tap) ============ */
function openPickerModal(q, slot, opts) {
  const mode = (opts && opts.mode) || 'place'; // 'place' | 'pair-partner'

  const val = lu[q][slot];
  const isPair = luIsPair(val);
  const soloId = (!isPair && typeof val === 'string') ? val : null;
  const soloPlayer = soloId ? luPlayerById(soloId) : null;

  const body = el('div', { class: 'modal modal-lg' });

  if (mode === 'pair-partner') {
    body.append(el('h3', {}, `${q} · ${slot} · Add ½ partner`));
    body.append(el('div', { class: 'picker-section' },
      soloPlayer
        ? `Picking partner for ${soloPlayer.name}. Each plays ½ of ${q} (counts 0.5 each).`
        : `Pick a partner. Each plays ½ of ${q} (counts 0.5 each).`));
  } else {
    body.append(el('h3', {}, `${q} · ${slot}`));

    if (soloPlayer) {
      body.append(el('div', { class: 'picker-current-bar' },
        el('span', { class: 'pc-name' }, soloPlayer.name),
        posLabel(soloPlayer.position) ? el('span', { class: 'picker-pos' }, posLabel(soloPlayer.position)) : null,
        el('button', { class: 'picker-pair-add', onclick: () => {
          closeModal();
          openPickerModal(q, slot, { mode: 'pair-partner' });
        }}, '+ Add ½ partner'),
        el('button', { class: 'picker-remove', onclick: () => {
          const cur = luLoad();
          luClearSlot(cur, q, slot);
          luSave(cur);
          closeModal();
          render();
        }}, 'Remove'),
      ));
    } else if (isPair) {
      const pa = luPlayerById(val.a);
      const pb = luPlayerById(val.b);
      const pairBar = el('div', { class: 'picker-current-bar pair' },
        el('div', { class: 'picker-pair-info' },
          el('div', { class: 'picker-pair-label' }, '½-Pair (each plays half)'),
          el('div', { class: 'picker-pair-names' },
            pa ? pa.name : '—', ' · ', pb ? pb.name : '—'),
        ),
        el('button', { class: 'picker-remove', onclick: () => {
          const cur = luLoad();
          luClearSlot(cur, q, slot);
          luSave(cur);
          closeModal();
          render();
        }}, 'Clear pair'),
      );
      body.append(pairBar);
      body.append(el('div', { class: 'picker-section', style: 'margin-top:8px' },
        'Tap a player below to replace this pair with a solo.'));
    }
  }

  const players = [...state.players].filter(p => p.active !== false);
  if (!players.length) {
    body.append(el('div', { style: 'padding:20px 0;color:var(--muted);text-align:center' },
      'No players. Add some on the Roster page.'));
  } else {
    const decorated = players.map(p => {
      const overall = playerOverallRating(p.id);
      const existing = luFindSlotInQuarter(lu, q, p.id);
      const sameQ = !!existing && existing.slot !== slot;
      const usage = luUsage(lu, p.id);
      return { p, overall, sameQ, existing, usage };
    });
    decorated.sort((a, b) => {
      const ao = a.overall == null ? -Infinity : a.overall;
      const bo = b.overall == null ? -Infinity : b.overall;
      if (bo !== ao) return bo - ao;
      return (a.p.jersey_number || 999) - (b.p.jersey_number || 999);
    });

    if (mode !== 'pair-partner') {
      body.append(el('div', { class: 'picker-section' }, 'All players · sorted by Overall'));
    }
    const listEl = el('div', { class: 'picker-list' });
    for (const d of decorated) {
      const { p, overall, sameQ, existing, usage } = d;
      const isCurrent = soloId === p.id;
      const isInPair = isPair && (val.a === p.id || val.b === p.id);
      const ovrClass = statClass(overall);
      const ovrText = overall == null ? '—' : (Math.round(overall * 10) / 10).toFixed(1);

      const numNode = (p.jersey_number != null && p.jersey_number !== '')
        ? el('div', { class: 'picker-jersey' }, String(p.jersey_number))
        : el('div', { class: 'picker-jersey no-num' }, '·');

      const usageText = (usage % 1 === 0) ? String(usage) : usage.toFixed(1);
      let note;
      if (mode === 'pair-partner') {
        if (p.id === soloId) note = 'Already the primary';
        else if (isInPair) note = 'Already in this pair';
        else if (sameQ) note = `Move from ${existing.slot} · ${usageText}/${LU_QUARTERS.length}`;
        else note = `${usageText}/${LU_QUARTERS.length}`;
      } else {
        if (isCurrent) note = 'Currently here (solo)';
        else if (isInPair) note = 'In this pair';
        else if (sameQ) note = `Move from ${existing.slot} · ${usageText}/${LU_QUARTERS.length}`;
        else note = `${usageText}/${LU_QUARTERS.length}`;
      }

      const hideRating = isLineupRatingsHidden();
      const disabled = mode === 'pair-partner' && (p.id === soloId || isInPair);
      const row = el('div', { class: `picker-row${isCurrent ? ' current' : ''}${disabled ? ' disabled' : ''}` },
        numNode,
        el('div', {},
          el('div', { class: 'picker-name' }, p.name),
          el('div', { class: 'picker-note' }, note),
        ),
        el('div', { class: 'picker-meta' },
          posLabel(p.position) ? el('span', { class: 'picker-pos' }, posLabel(p.position)) : null,
        ),
        hideRating ? null : el('div', { class: `picker-ovr ${ovrClass}` }, ovrText),
      );
      row.addEventListener('click', () => {
        if (disabled) return;
        const cur = luLoad();
        if (mode === 'pair-partner') {
          const r = luAddPartner(cur, q, slot, p.id);
          if (!r.ok) return toast(r.msg);
        } else {
          const r = luPlaceInSlot(cur, q, slot, p.id);
          if (!r.ok) return toast(r.msg);
        }
        luSave(cur);
        closeModal();
        render();
      });
      listEl.append(row);
    }
    body.append(listEl);
  }

  body.append(el('div', { class: 'modal-actions' },
    mode === 'pair-partner'
      ? el('button', { class: 'btn btn-ghost', onclick: () => {
          closeModal();
          openPickerModal(q, slot);
        }}, 'Back')
      : el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Close'),
  ));
  openModal(body);
}

/* ============ WORKOUT VIEW ============ */
const WO_LS_KEY = 'hoops-workout-v1';
const workout = {
  exercises: ['', '', '', '', ''],      // 5 column titles
  counts: {},                            // { [playerId]: [n,n,n,n,n] }
  timerSeconds: 30,                      // configured duration
  timerRemaining: 30,                    // current countdown value
  timerRunning: false,
  timerEndAt: null,                      // epoch ms when current run ends
  intervalId: null,
};

function loadWorkout() {
  try {
    const raw = lsGet(WO_LS_KEY);
    if (!raw) return;
    const o = JSON.parse(raw);
    if (Array.isArray(o.exercises) && o.exercises.length === 5) workout.exercises = o.exercises;
    if (o.counts && typeof o.counts === 'object') workout.counts = o.counts;
    if (Number.isFinite(o.timerSeconds) && o.timerSeconds > 0) {
      workout.timerSeconds = o.timerSeconds;
      workout.timerRemaining = o.timerSeconds;
    }
  } catch(e) {}
}
function saveWorkout() {
  lsSet(WO_LS_KEY, JSON.stringify({
    exercises: workout.exercises,
    counts: workout.counts,
    timerSeconds: workout.timerSeconds,
  }));
}

function woGetCount(playerId, idx) {
  const row = workout.counts[playerId];
  if (!Array.isArray(row)) return 0;
  return row[idx] || 0;
}
function woSetCount(playerId, idx, val) {
  if (!workout.counts[playerId]) workout.counts[playerId] = [0,0,0,0,0];
  workout.counts[playerId][idx] = Math.max(0, val);
  saveWorkout();
}

function woTickStart() {
  if (workout.intervalId) clearInterval(workout.intervalId);
  workout.intervalId = setInterval(() => {
    if (!workout.timerRunning) return;
    const remaining = Math.max(0, Math.ceil((workout.timerEndAt - Date.now()) / 1000));
    workout.timerRemaining = remaining;
    woUpdateClockDisplay();
    if (remaining <= 0) {
      workout.timerRunning = false;
      clearInterval(workout.intervalId);
      workout.intervalId = null;
      woPlayBeep();
      woUpdateClockDisplay();
      woUpdateButtons();
    }
  }, 100);
}
function woStartTimer() {
  if (workout.timerRemaining <= 0) workout.timerRemaining = workout.timerSeconds;
  workout.timerEndAt = Date.now() + workout.timerRemaining * 1000;
  workout.timerRunning = true;
  woTickStart();
  woUpdateClockDisplay();
  woUpdateButtons();
}
function woPauseTimer() {
  workout.timerRunning = false;
  if (workout.intervalId) { clearInterval(workout.intervalId); workout.intervalId = null; }
  woUpdateClockDisplay();
  woUpdateButtons();
}
function woResetTimer() {
  workout.timerRunning = false;
  if (workout.intervalId) { clearInterval(workout.intervalId); workout.intervalId = null; }
  workout.timerRemaining = workout.timerSeconds;
  woUpdateClockDisplay();
  woUpdateButtons();
}

let woAudioCtx = null;
function woPlayBeep() {
  try {
    if (!woAudioCtx) woAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = woAudioCtx;
    const now = ctx.currentTime;
    [0, 0.25, 0.5].forEach((t) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.0001, now + t);
      g.gain.exponentialRampToValueAtTime(0.4, now + t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.18);
      o.connect(g); g.connect(ctx.destination);
      o.start(now + t); o.stop(now + t + 0.2);
    });
  } catch(e) {}
}

function woFormat(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}
function woUpdateClockDisplay() {
  const clk = $('#wo-clock');
  if (!clk) return;
  clk.textContent = woFormat(workout.timerRemaining);
  clk.classList.remove('running', 'done');
  if (workout.timerRunning) clk.classList.add('running');
  else if (workout.timerRemaining === 0) clk.classList.add('done');
}
function woUpdateButtons() {
  const start = $('#wo-start');
  const pause = $('#wo-pause');
  if (!start || !pause) return;
  if (workout.timerRunning) { start.style.display = 'none'; pause.style.display = ''; }
  else { start.style.display = ''; pause.style.display = 'none'; }
}

function renderWorkout(root) {
  const wrap = el('div', { class: 'wo-wrap' });

  wrap.append(el('div', { class: 'game-header' },
    el('button', { class: 'iconbtn', onclick: () => { state.view = 'home'; render(); } }, '←'),
    el('h2', { style: 'margin:0' }, 'Workout'),
    el('div', { class: 'header-spacer' }),
    el('button', { class: 'btn btn-ghost', onclick: () => {
      if (confirm('Clear all rep counts? Exercise titles stay.')) {
        workout.counts = {};
        saveWorkout();
        render();
      }
    }}, 'Clear Counts'),
  ));

  // Timer card
  const secsInput = el('input', {
    type: 'number', min: '1', max: '3600', value: String(workout.timerSeconds),
    class: 'wo-secs-input', id: 'wo-secs',
    onchange: (e) => {
      const v = parseInt(e.target.value) || 30;
      workout.timerSeconds = Math.max(1, Math.min(3600, v));
      e.target.value = workout.timerSeconds;
      if (!workout.timerRunning) {
        workout.timerRemaining = workout.timerSeconds;
        woUpdateClockDisplay();
      }
      saveWorkout();
    },
  });

  const mkPreset = (n, label) => el('button', { class: 'wo-preset', onclick: () => {
    workout.timerSeconds = n;
    secsInput.value = n;
    if (!workout.timerRunning) {
      workout.timerRemaining = n;
      woUpdateClockDisplay();
    }
    saveWorkout();
  }}, label);

  const timerCard = el('div', { class: 'wo-timer-card' },
    el('div', { class: 'wo-clock-col' },
      el('div', { class: 'wo-clock', id: 'wo-clock' }, woFormat(workout.timerRemaining)),
      el('div', { class: 'wo-clock-sub' }, 'Time Remaining'),
    ),
    el('div', { class: 'wo-ctrl-col' },
      el('div', { class: 'wo-ctrl-row' },
        el('label', {}, 'Seconds'),
        secsInput,
        mkPreset(15, '15s'),
        mkPreset(30, '30s'),
        mkPreset(45, '45s'),
        mkPreset(60, '60s'),
        mkPreset(120, '2m'),
      ),
      el('div', { class: 'wo-ctrl-row' },
        el('button', { class: 'wo-big-btn', id: 'wo-start', onclick: woStartTimer },
          workout.timerRemaining === workout.timerSeconds ? '▶ Start' : '▶ Resume'),
        el('button', { class: 'wo-big-btn pause', id: 'wo-pause', style: 'display:none', onclick: woPauseTimer }, '⏸ Pause'),
        el('button', { class: 'wo-big-btn ghost', onclick: woResetTimer }, '↺ Reset'),
      ),
    ),
  );
  wrap.append(timerCard);

  // Player x exercise grid
  const players = [...state.players].sort((a, b) => (a.jersey_number || 999) - (b.jersey_number || 999));

  if (players.length === 0) {
    wrap.append(el('div', { class: 'wo-empty' }, 'No players yet — add some on the Roster page'));
    root.append(wrap);
    woUpdateButtons();
    return;
  }

  const table = el('table', { class: 'wo-table' });
  const thead = el('thead');
  const headRow = el('tr');
  headRow.append(el('th', {}, 'Player'));
  for (let i = 0; i < 5; i++) {
    headRow.append(el('th', { class: 'wo-ex-th' },
      el('input', {
        type: 'text', class: 'wo-ex-input',
        placeholder: `Exercise ${i+1}`,
        value: workout.exercises[i] || '',
        onchange: (e) => { workout.exercises[i] = e.target.value; saveWorkout(); },
      }),
    ));
  }
  thead.append(headRow);
  table.append(thead);

  const tbody = el('tbody');
  for (const p of players) {
    const row = el('tr');
    const jersey = p.jersey_number != null && p.jersey_number !== '' ? `#${p.jersey_number}` : '';
    row.append(el('td', { class: 'wo-name-cell' },
      el('span', { class: 'wo-jersey' }, jersey),
      p.name,
    ));
    for (let i = 0; i < 5; i++) {
      const cellId = `wo-cell-${p.id}-${i}`;
      const val = woGetCount(p.id, i);
      const btn = el('button', {
        class: 'wo-cell-btn' + (val > 0 ? ' has-val' : ' zero'),
        id: cellId,
        onclick: (ev) => {
          const cur = woGetCount(p.id, i);
          woSetCount(p.id, i, cur + 1);
          const b = ev.currentTarget;
          b.textContent = woGetCount(p.id, i);
          b.classList.remove('zero'); b.classList.add('has-val');
          // brief flash
          const td = b.closest('td');
          if (td) {
            td.classList.remove('wo-flash');
            // force reflow to restart animation
            void td.offsetWidth;
            td.classList.add('wo-flash');
          }
        },
      }, val);
      const minus = el('button', {
        class: 'wo-cell-minus', title: 'Subtract 1',
        onclick: (ev) => {
          ev.stopPropagation();
          const cur = woGetCount(p.id, i);
          if (cur <= 0) return;
          woSetCount(p.id, i, cur - 1);
          const next = woGetCount(p.id, i);
          btn.textContent = next;
          if (next === 0) { btn.classList.add('zero'); btn.classList.remove('has-val'); }
        },
      }, '−');
      row.append(el('td', { class: 'wo-cell' }, btn, minus));
    }
    tbody.append(row);
  }
  table.append(tbody);
  wrap.append(el('div', { class: 'wo-table-wrap' }, table));

  root.append(wrap);
  woUpdateButtons();
}

/* ============ SYNC CENTER ============ */
function openSyncCenter() {
  function render() {
    const root = $('#modal-root');
    root.innerHTML = '';
    const st = syncPillState();
    const pc = sync.outbox.length;
    const block = el('div', { class: `sync-status-block ${st}` },
      el('div', { class: 'sync-status-icon' },
        st === 'synced' ? '🟢' : st === 'pending' ? '🟡' : st === 'offline' ? '🔴' : '⚠️'),
      el('div', { class: 'sync-status-text' },
        el('div', { class: 'sync-status-title' },
          st === 'synced' ? 'All synced' :
          st === 'pending' ? `${pc} change${pc === 1 ? '' : 's'} pending — pushing` :
          st === 'offline' ? `Offline · ${pc} change${pc === 1 ? '' : 's'} queued` :
          `Sync error · ${pc} stuck`),
        el('div', { class: 'sync-status-sub' },
          st === 'synced' ? 'Everything on this iPad matches the server.' :
          st === 'pending' ? 'Background sync is running. Safe to keep using the app.' :
          st === 'offline' ? (sync.offlineToggle ? 'OFFLINE toggle is on. Your changes are saved locally and will push when you turn it off.' : 'No network detected. Changes are saved locally and will push when wifi returns.') :
          (sync.lastErrorMsg ? sync.lastErrorMsg : 'Last sync attempt failed. Tap Sync Now to retry.')),
      ),
    );

    const toggleRow = el('div', { class: 'sync-toggle-row' },
      el('label', { for: 'sync-offline-toggle' },
        'OFFLINE mode',
        el('div', { class: 'hint' }, 'When ON, no Supabase calls. All work saves locally.'),
      ),
      el('label', { class: 'sync-switch' },
        el('input', {
          type: 'checkbox', id: 'sync-offline-toggle',
          checked: sync.offlineToggle ? 'checked' : null,
          onchange: (e) => { setOfflineToggle(e.target.checked); render(); updateSyncPill(); },
        }),
        el('span', { class: 'sync-switch-track' },
          el('span', { class: 'sync-switch-thumb' }),
        ),
      ),
    );

    const actions = el('div', { class: 'sync-actions' },
      el('button', {
        class: 'btn btn-primary',
        disabled: (!effectivelyOnline() || !pc) ? '' : null,
        style: (!effectivelyOnline() || !pc) ? 'opacity:0.4; pointer-events:none;' : '',
        onclick: async () => {
          const r = await flushOutbox({ manual: true });
          if (r.ok) toast(r.drained ? `Synced ${r.drained}` : 'Already synced');
          else if (r.reason === 'error') toast('Sync error — see Pending list');
          else if (r.reason === 'offline') toast('You are offline');
          render();
        },
      }, 'Sync Now'),
      el('button', {
        class: 'btn btn-ghost',
        onclick: () => { backupCurrentGame(); },
      }, state.currentGameId ? '💾 Backup Game' : '💾 Backup All'),
    );

    const actions2 = el('div', { class: 'sync-actions' },
      el('button', {
        class: 'btn btn-ghost',
        onclick: () => { restoreBackupFromFile(() => render()); },
      }, '📂 Restore from Backup'),
      el('button', {
        class: 'btn btn-ghost',
        style: pc ? '' : 'opacity:0.4; pointer-events:none;',
        disabled: pc ? null : '',
        onclick: () => {
          if (!confirm(`Clear ${pc} pending change${pc === 1 ? '' : 's'} WITHOUT pushing to the server? Local data stays. This cannot be undone.`)) return;
          sync.outbox = []; persistOutbox(); notifySync(); render();
        },
      }, 'Discard pending'),
    );

    let pendingList = null;
    if (pc) {
      pendingList = el('div', { class: 'sync-pending-list' });
      for (const e of sync.outbox.slice(0, 50)) {
        const item = el('div', { class: 'sync-pending-item' },
          el('span', { class: `op ${e.op}` }, e.op.toUpperCase()),
          el('span', { class: 'tbl' }, e.table),
          el('span', {},
            (e.rowId || '').slice(0, 8) + (e.lastError ? ' · ' : ''),
            e.lastError ? el('span', { class: 'err' }, `try ${e.attempts}: ${e.lastError.slice(0, 60)}`) : null,
          ),
        );
        pendingList.append(item);
      }
      if (sync.outbox.length > 50) {
        pendingList.append(el('div', { class: 'sync-pending-item', style: 'justify-content:center;color:var(--muted)' },
          el('span', {}, ''), el('span', {}, ''),
          el('span', {}, `+ ${sync.outbox.length - 50} more`)));
      }
    }

    const body = el('div', { class: 'modal modal-lg sync-center' },
      el('h3', {}, 'Sync Center'),
      block,
      toggleRow,
      actions,
      actions2,
      pendingList,
      el('div', { class: 'modal-actions' },
        el('button', { class: 'btn btn-ghost', onclick: closeModal }, 'Close'),
      ),
    );
    openModal(body);
  }
  render();
  const off = onSyncChange(render);
  // Auto-detach when modal closes (poll modal-root)
  const cleanup = setInterval(() => {
    if (!$('#modal-root').firstChild) { off(); clearInterval(cleanup); }
  }, 500);
}

/* ============ BACKUP / RESTORE ============ */
function backupCurrentGame() {
  const gid = state.currentGameId;
  const everything = {
    version: 1,
    exportedAt: new Date().toISOString(),
    scope: gid ? 'game' : 'all',
    game: gid ? state.games.find(g => g.id === gid) : null,
    games: gid ? null : state.games,
    players: state.players,
    events: gid ? state.events : null,
    stints: gid ? state.stints : null,
    ratings: (function() { try { return JSON.parse(lsGet('hoops-ratings-v1') || '{}'); } catch(e) { return {}; } })(),
    positions: (function() { try { return JSON.parse(lsGet('hoops-positions') || '{}'); } catch(e) { return {}; } })(),
    lineupTool: (function() { try { return JSON.parse(lsGet('hoops-lineup-v1') || 'null'); } catch(e) { return null; } })(),
    savedLineups: loadSavedLineups(),
    outbox: sync.outbox,
  };
  const filename = gid
    ? `hoops-backup-${(everything.game?.opponent || 'game').replace(/\W+/g, '-')}-${(everything.game?.game_date || '').replace(/-/g, '')}-${new Date().toISOString().slice(0, 16).replace(/[:T-]/g, '')}.json`
    : `hoops-backup-all-${new Date().toISOString().slice(0, 16).replace(/[:T-]/g, '')}.json`;
  const blob = new Blob([JSON.stringify(everything, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.append(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  toast('Backup downloaded');
}

function restoreBackupFromFile(onDone) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json,.json';
  input.onchange = async () => {
    const f = input.files && input.files[0];
    if (!f) { onDone && onDone(); return; }
    let data;
    try { data = JSON.parse(await f.text()); }
    catch(e) { toast('Bad backup file'); return; }
    if (!data || data.version !== 1) { toast('Unsupported backup'); return; }
    if (!confirm(`Restore backup from ${new Date(data.exportedAt).toLocaleString()}? Existing data will be upserted (no deletes). The backup’s pending sync ops will also re-queue.`)) {
      onDone && onDone(); return;
    }
    // Restore games/players/events/stints into state + outbox
    const gamesToUpsert = data.scope === 'game' ? (data.game ? [data.game] : []) : (data.games || []);
    for (const g of gamesToUpsert) {
      if (!state.games.find(x => x.id === g.id)) state.games.unshift(g);
      else Object.assign(state.games.find(x => x.id === g.id), g);
      oxb.upsert('games', g);
    }
    for (const p of (data.players || [])) {
      const ex = state.players.find(x => x.id === p.id);
      if (ex) Object.assign(ex, p); else state.players.push(p);
      oxb.upsert('players', p);
    }
    saveCache();
    if (data.scope === 'game' && data.game) {
      const gid = data.game.id;
      const existingEvents = loadGameDataCache(gid).events;
      const existingStints = loadGameDataCache(gid).stints;
      const mergedEvents = mergeById(existingEvents, data.events || []);
      const mergedStints = mergeById(existingStints, data.stints || []);
      persistGameData(gid, mergedEvents, mergedStints);
      if (state.currentGameId === gid) {
        state.events = mergedEvents;
        state.stints = mergedStints;
      }
      for (const ev of (data.events || [])) oxb.upsert('events', ev);
      for (const st of (data.stints || [])) oxb.upsert('stints', st);
    }
    if (data.ratings) lsSet('hoops-ratings-v1', JSON.stringify(data.ratings));
    if (data.positions) lsSet('hoops-positions', JSON.stringify(data.positions));
    if (data.lineupTool) lsSet('hoops-lineup-v1', JSON.stringify(data.lineupTool));
    if (Array.isArray(data.savedLineups)) {
      const local = loadSavedLineups();
      const localIds = new Set(local.map(s => s.id));
      const merged = [...local];
      for (const s of data.savedLineups) if (!localIds.has(s.id)) merged.push(s);
      saveSavedLineups(merged);
    }
    // Re-queue any outbox ops that were saved in the backup (idempotent)
    if (Array.isArray(data.outbox)) {
      for (const e of data.outbox) {
        if (e.op === 'upsert' && e.payload) oxb.upsert(e.table, e.payload);
        else if (e.op === 'delete') oxb.delete(e.table, e.rowId);
      }
    }
    toast('Backup restored');
    if (typeof render === 'function') render();
    onDone && onDone();
  };
  input.click();
}
function mergeById(a, b) {
  const out = [...a];
  const idx = new Map(out.map((r, i) => [r.id, i]));
  for (const r of b) {
    if (idx.has(r.id)) out[idx.get(r.id)] = r;
    else { idx.set(r.id, out.length); out.push(r); }
  }
  return out;
}

/* ============ MODALS / TOAST ============ */
function openModal(content) {
  const root = $('#modal-root');
  root.innerHTML = '';
  const bg = el('div', { class: 'modal-bg', onclick: (e) => { if (e.target === e.currentTarget) closeModal(); } }, content);
  root.append(bg);
}
function closeModal() {
  $('#modal-root').innerHTML = '';
}
function toast(msg) {
  const root = $('#toast-root');
  const t = el('div', { class: 'toast' }, msg);
  root.innerHTML = '';
  root.append(t);
  setTimeout(() => t.remove(), 2200);
}

/* ============ NAV ============ */
$('#brand-home').onclick = () => { state.view = 'home'; render(); };
$('#nav-games').onclick = () => { state.view = 'home'; render(); };
$('#nav-roster').onclick = () => { state.view = 'roster'; render(); };
$('#nav-workout').onclick = () => { state.view = 'workout'; render(); };
$('#nav-lineup').onclick = () => { state.view = 'lineup'; render(); };
$('#nav-ratings').onclick = () => { state.view = 'ratings'; render(); };
$('#sync-pill').onclick = () => openSyncCenter();

/* ============ SYNC STATUS PILL ============ */
function syncPillState() {
  if (sync.offlineToggle || !sync.navOnline) return 'offline';
  if (sync.outbox.length === 0) {
    const recentErr = sync.lastErrorAt && (Date.now() - sync.lastErrorAt) < SYNC_RECENT_ERROR_MAX_AGE_MS;
    if (recentErr) return 'error';
    return 'synced';
  }
  return 'pending';
}
function updateSyncPill() {
  const pill = document.getElementById('sync-pill');
  const label = document.getElementById('sync-pill-label');
  if (!pill || !label) return;
  const st = syncPillState();
  pill.setAttribute('data-state', st);
  const pc = sync.outbox.length;
  if (st === 'offline') label.textContent = pc ? `OFFLINE · ${pc}` : 'OFFLINE';
  else if (st === 'pending') label.textContent = `${pc} PENDING`;
  else if (st === 'error') label.textContent = pc ? `${pc} STUCK` : 'RETRY';
  else label.textContent = 'SYNCED';
}
onSyncChange(updateSyncPill);
updateSyncPill();

/* ============ INIT ============ */
loadWorkout();
loadInitial();
</script>
