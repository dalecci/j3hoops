<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A4D"/>
      <stop offset="55%" stop-color="#FF6A1F"/>
      <stop offset="100%" stop-color="#C24700"/>
    </linearGradient>
    <radialGradient id="hl" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#hl)"/>
  <!-- Basketball -->
  <g transform="translate(256 256)">
    <circle r="148" fill="#1a1a1d" stroke="#0a0a0b" stroke-width="6"/>
    <!-- Seam lines -->
    <g stroke="#0a0a0b" stroke-width="9" stroke-linecap="round" fill="none">
      <line x1="-148" y1="0" x2="148" y2="0"/>
      <line x1="0" y1="-148" x2="0" y2="148"/>
      <path d="M -132 -68 C -60 -10, -60 10, -132 68" />
      <path d="M 132 -68 C 60 -10, 60 10, 132 68" />
    </g>
    <!-- Highlight -->
    <ellipse cx="-50" cy="-55" rx="40" ry="22" fill="#FFFFFF" opacity="0.12"/>
  </g>
  <!-- "W" mark in lower-right corner area, subtle -->
  <text x="256" y="488" font-family="Inter,Arial,sans-serif" font-size="56" font-weight="900" text-anchor="middle" fill="#FFFFFF" opacity="0.9" letter-spacing="2">WARRIORS</text>
</svg>
